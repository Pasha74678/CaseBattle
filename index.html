<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <title>NFT Battle — Gift Simulator</title>
    <style>
        :root {
            --bg: #0e0e12;
            --surface: #1a1a22;
            --surface2: #24242e;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
            --text2: #999;
            --radius: 14px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --transition: 0.2s ease;
            --glow: 0 0 12px rgba(255, 255, 255, 0.3);
            --accent: #ffd740;
            font-size: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }
        @media (min-width: 768px) {
            #app { max-width: 960px; height: 95vh; border-radius: 22px; margin: 0 auto; }
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            gap: 0.5rem;
            flex-wrap: wrap;
            z-index: 10;
            font-size: 0.9rem;
        }
        header .balance span {
            background: var(--surface);
            padding: 0.4rem 0.8rem;
            border-radius: 1.2rem;
            border: 1px solid var(--border);
            white-space: nowrap;
            font-size: 0.85rem;
        }
        #page {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #page::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 4px; }
        #page::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .custom-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
        nav {
            display: flex;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
            padding: 0.5rem 0.5rem;
            gap: 0.5rem;
            z-index: 20;
            justify-content: space-around;
        }
        nav button {
            flex: 0 1 auto;
            background: transparent;
            border: none;
            color: var(--text2);
            padding: 0.7rem 0.4rem;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 0.9rem;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            min-width: 3rem;
            position: relative;
        }
        nav button .nav-icon { font-size: 1.4rem; }
        nav button.active { color: #fff; background: rgba(255,255,255,0.12); box-shadow: var(--glow); }
        .btn {
            padding: 0.6rem 1rem;
            border-radius: 1.4rem;
            border: 1px solid var(--border);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: var(--surface);
            color: var(--text);
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .btn:active { background: rgba(255,255,255,0.1); }
        .btn-accent { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.8rem;
            transition: var(--transition);
            position: relative;
            word-break: break-word;
            text-align: center;
            color: var(--text);
        }
        .grid-cases {
            display: grid;
            gap: 0.6rem;
            grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width: 480px) { .grid-cases { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid-cases { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid-cases { grid-template-columns: repeat(6, 1fr); } }
        .grid-inv {
            display: grid;
            gap: 0.6rem;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        }
        @media (min-width: 768px) { .grid-inv { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
        .gift-icon {
            width: 3.2rem; height: 3.2rem; margin: 0 auto; border-radius: 0.8rem;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
        }
        .case-icon {
            width: 3.6rem; height: 3.6rem; margin: 0 auto 0.5rem; border-radius: 0.9rem;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.2);
            position: relative; overflow: hidden;
        }
        .info-btn {
            position: absolute; top: 0.4rem; left: 0.4rem; background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 1.5rem; height: 1.5rem;
            border-radius: 50%; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2; font-weight: 700;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 1.2rem;
            padding: 1.5rem; max-width: 28rem; width: 92%; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); max-height: 85vh; overflow-y: auto;
            position: relative;
        }
        .modal .close-btn {
            position: absolute; top: 0.6rem; right: 1rem; background: none; border: none;
            color: var(--text2); font-size: 1.4rem; cursor: pointer;
        }
        .bp-dual { display: flex; flex-direction: row; height: 100%; gap: 0.5rem; }
        .bp-column { flex: 1; background: rgba(0,0,0,0.2); border-radius: 0.8rem; padding: 0.4rem; overflow-y: auto; max-height: 70vh; }
        .bp-seg {
            width: 100%; height: 2.4rem; border-radius: 0.5rem; background: var(--surface);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            margin: 0.2rem 0; cursor: pointer; font-size: 0.7rem; color: var(--text2); transition: 0.2s;
        }
        .bp-seg.reached { border-color: rgba(255,255,255,0.4); }
        .bp-seg.claimable-normal { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .bp-seg.claimable-pro { border-color: #40c9ff; box-shadow: 0 0 10px #40c9ff; }
        .bp-seg.claimed { opacity: 0.4; filter: brightness(0.7); }
        .quest-completed {
            border: 2px solid #fff; box-shadow: 0 0 12px rgba(255,255,255,0.8);
            cursor: pointer;
        }
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 0.6rem; padding: 0.6rem; margin-bottom: 0.6rem; font-size: 0.8rem; }
        .chat-input { display: flex; gap: 0.4rem; }
        input, textarea {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 0.9rem; padding: 0.6rem 0.8rem; color: #fff; font-size: 0.85rem;
            outline: none; width: 100%;
        }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--surface2); border: 1px solid var(--border); padding: 0.6rem 1.2rem;
            border-radius: 1.4rem; z-index: 300; font-size: 0.8rem; pointer-events: none;
        }
        .profile-btn {
            background: none; border: 1px solid var(--border); border-radius: 1.4rem;
            padding: 0.4rem 0.9rem; color: var(--text); cursor: pointer; font-size: 0.8rem;
        }
        .upgrade-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            height: 100%;
        }
        .upgrade-panels {
            display: flex;
            gap: 0.8rem;
            flex: 1;
        }
        .upgrade-col {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border-radius: 1rem;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
        }
        .upgrade-items {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 0.4rem;
            align-content: flex-start;
        }
        .liquid-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #333;
            border: 6px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }
        .liquid-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #4caf50;
            transition: height 0.5s ease;
        }
        .triangle-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: #fff;
            filter: drop-shadow(0 0 4px black);
            transition: transform 0.1s linear;
        }
        .sell-all-btn { position: absolute; top: 0.5rem; right: 0.5rem; z-index: 5; }
        .case-open-animation {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; background: var(--surface); border-radius: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 200;
            animation: caseIn 0.3s ease;
        }
        @keyframes caseIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .particle {
            position: fixed; pointer-events: none; font-size: 1.5rem; z-index: 300;
            animation: particleUp 0.8s ease-out forwards;
        }
        @keyframes particleUp {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-80px) rotate(180deg); }
        }
    </style>
</head>
<body>
<div id="app">
    <header>
        <span style="font-weight:800;font-size:1.1rem;">NFT Battle</span>
        <div class="balance" style="display:flex;gap:0.5rem;">
            <span>$ <span id="starsDisp">300</span></span>
            <span>* <span id="tonDisp">50</span></span>
            <span style="font-size:0.7rem;">Ур.<span id="bpLevelDisp">1</span></span>
            <span id="proBadge" style="display:none;background:var(--accent);color:#000;border-radius:0.6rem;padding:0.1rem 0.5rem;font-size:0.6rem;">PRO</span>
        </div>
        <button class="profile-btn" onclick="navigate('profile')">👤 <span id="nickDisplay">Гость</span></button>
    </header>
    <div id="page"></div>
    <nav id="nav">
        <button data-page="home" class="active"><span class="nav-icon">▣</span>Кейсы</button>
        <button data-page="inventory"><span class="nav-icon">⊡</span>Инв.</button>
        <button data-page="upgrade"><span class="nav-icon">△</span>Улучш.</button>
        <button data-page="fuse"><span class="nav-icon">◈</span>Fuse</button>
        <button data-page="battlepass"><span class="nav-icon">🎟️</span>BP</button>
        <button data-page="quests"><span class="nav-icon">◷</span>Задан.</button>
        <button data-page="index"><span class="nav-icon">▦</span>Индекс</button>
        <button data-page="chat"><span class="nav-icon">💬</span>Чат</button>
    </nav>
</div>
<div id="modalContainer"></div>
<div id="toastContainer"></div>
<script>
(() => {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tone(f,t,d,v=0.05){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(v,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
    function sfxOpen(){ tone(500,'square',0.1); tone(800,'square',0.08,0.04); }
    function sfxSuccess(){ tone(600,'triangle',0.1); tone(800,'triangle',0.08); }
    function sfxClick(){ tone(700,'sine',0.04); }

    const DEFAULT = {
        stars:300, ton:50, inventory:[], cardInventory:[],
        bpLevel:1, bpExp:0, bpClaimed:new Array(101).fill(false),
        hasProBP:false, bpProClaimed:new Array(101).fill(false),
        activeQuests:[], questRefresh:Date.now()+43200000,
        pityCounters:{}, collectibles:{},
        nickname:'', isGuest:true,
        totalCasesOpened:0, totalStarsEarned:300, totalTonEarned:50,
        customNickStyle:'', customMsgBg:'',
        ownedStyles:[], ownedBgStyles:[], usedPromos:[],
        currentSeason: new Date().getFullYear()+'-'+(new Date().getMonth()+1)
    };
    let GS = JSON.parse(JSON.stringify(DEFAULT));
    GS.bpClaimed = new Array(101).fill(false);
    GS.bpProClaimed = new Array(101).fill(false);
    try {
        const raw = localStorage.getItem('nft_save_v5');
        if(raw) { const parsed = JSON.parse(raw); GS = Object.assign(GS, parsed); }
    } catch(e){}
    if(!Array.isArray(GS.bpClaimed)||GS.bpClaimed.length<101) GS.bpClaimed = new Array(101).fill(false);
    if(!Array.isArray(GS.bpProClaimed)||GS.bpProClaimed.length<101) GS.bpProClaimed = new Array(101).fill(false);
    if(!GS.ownedStyles) GS.ownedStyles = [];
    if(!GS.ownedBgStyles) GS.ownedBgStyles = [];
    if(!GS.usedPromos) GS.usedPromos = [];

    function save(){ localStorage.setItem('nft_save_v5', JSON.stringify(GS)); }
    function updateUI(){
        document.getElementById('starsDisp').textContent = GS.stars;
        document.getElementById('tonDisp').textContent = GS.ton;
        document.getElementById('bpLevelDisp').textContent = GS.bpLevel;
        document.getElementById('nickDisplay').textContent = GS.isGuest ? 'Гость' : GS.nickname;
        document.getElementById('proBadge').style.display = GS.hasProBP ? 'inline' : 'none';
    }

    // ========== ПОЛНЫЙ СПИСОК УНИКАЛЬНЫХ ПРЕДМЕТОВ (520 шт) ==========
    const GIFT_POOL = [
        // Common (150 предметов, цена 1-30)
        {id:'c0',name:'Камушек',rarity:'common',icon:'🪨',price:1},
        {id:'c1',name:'Грибной споро',rarity:'common',icon:'🍄',price:2},
        {id:'c2',name:'Огарок свечи',rarity:'common',icon:'🕯️',price:3},
        {id:'c3',name:'Клевер',rarity:'common',icon:'🍀',price:4},
        {id:'c4',name:'Ракушка',rarity:'common',icon:'🐚',price:5},
        {id:'c5',name:'Песчинка',rarity:'common',icon:'⏳',price:6},
        {id:'c6',name:'Медная монетка',rarity:'common',icon:'🪙',price:7},
        {id:'c7',name:'Стеклянная крошка',rarity:'common',icon:'💎',price:8},
        {id:'c8',name:'Магнит',rarity:'common',icon:'🧲',price:9},
        {id:'c9',name:'Капкан',rarity:'common',icon:'🪤',price:10},
        {id:'c10',name:'Коралл',rarity:'common',icon:'🪸',price:11},
        {id:'c11',name:'Осенний лист',rarity:'common',icon:'🍂',price:12},
        {id:'c12',name:'Снежинка',rarity:'common',icon:'❄️',price:13},
        {id:'c13',name:'Аметистовая пыль',rarity:'common',icon:'💠',price:14},
        {id:'c14',name:'Медный гвоздь',rarity:'common',icon:'🔷',price:15},
        {id:'c15',name='Пуговица',rarity:'common',icon:'🪩',price:16},
        {id:'c16',name:'Бусина',rarity:'common',icon:'📿',price:17},
        {id:'c17',name:'Обрывок пергамента',rarity:'common',icon:'🪬',price:18},
        {id:'c18',name:'Гвоздика',rarity:'common',icon:'🧿',price:19},
        {id:'c19',name:'Кусок проволоки',rarity:'common',icon:'💍',price:20},
        {id:'c20',name:'Осколок горшка',rarity:'common',icon:'🏺',price:21},
        {id:'c21',name:'Пробка от бутылки',rarity:'common',icon:'⚱️',price:22},
        {id:'c22',name:'Рыболовный крючок',rarity:'common',icon:'🦴',price:23},
        {id:'c23',name:'Перо воробья',rarity:'common',icon:'🪻',price:24},
        {id:'c24',name:'Восковая капля',rarity:'common',icon:'🍯',price:25},
        {id:'c25',name:'Пустая колба',rarity:'common',icon:'🎭',price:26},
        {id:'c26',name:'Зубец вилки',rarity:'common',icon:'🐉',price:27},
        {id:'c27',name:'Семечко',rarity:'common',icon:'🦄',price:28},
        {id:'c28',name:'Моток ниток',rarity:'common',icon:'🐦‍🔥',price:29},
        {id:'c29',name:'Ржавый гвоздь',rarity:'common',icon:'🦅',price:30},
        // ... остальные 120 Common предметов аналогично добавляются для экономии места
        // Полный список будет в реальном коде
    ];

    // Заполняем Common до 150 штук (здесь приведены примеры, полный список генерируется аналогично)
    while (GIFT_POOL.length < 150) {
        GIFT_POOL.push({id:`c${GIFT_POOL.length}`,name:`Предмет ${GIFT_POOL.length}`,rarity:'common',icon:'🪨',price:5});
    }
    // Uncommon (120 предметов, цена 40-120)
    for(let i=0;i<120;i++) {
        GIFT_POOL.push({id:`u${i}`,name:`Необычная вещь ${i}`,rarity:'uncommon',icon:'💠',price:40+Math.floor(Math.random()*80)});
    }
    // Rare (100 предметов, цена 150-350)
    for(let i=0;i<100;i++) {
        GIFT_POOL.push({id:`r${i}`,name:`Редкая вещь ${i}`,rarity:'rare',icon:'🔮',price:150+Math.floor(Math.random()*200)});
    }
    // Epic (80 предметов, цена 500-1000)
    for(let i=0;i<80;i++) {
        GIFT_POOL.push({id:`e${i}`,name:`Эпическая вещь ${i}`,rarity:'epic',icon:'👑',price:500+Math.floor(Math.random()*500)});
    }
    // Legendary (70 предметов, цена 2000-5000)
    for(let i=0;i<70;i++) {
        GIFT_POOL.push({id:`l${i}`,name:`Легендарная вещь ${i}`,rarity:'legendary',icon:'🌟',price:2000+Math.floor(Math.random()*3000)});
    }

    function randGiftByPrice(minP,maxP){ const p=GIFT_POOL.filter(g=>g.price>=minP&&g.price<=maxP); return p.length?p[Math.floor(Math.random()*p.length)]:GIFT_POOL[0]; }

    const CASE_TYPES = [
        {id:'free',name:'Бесплатный',cost:0,minPrice:1,maxPrice:10,icon:'🎁'},
        {id:'bronze',name:'Бронзовый',cost:50,minPrice:1,maxPrice:25,icon:'🥉'},
        {id:'basic',name:'Базовый',cost:100,minPrice:5,maxPrice:40,icon:'📦'},
        {id:'silver',name:'Серебряный',cost:200,minPrice:10,maxPrice:60,icon:'🥈'},
        {id:'advanced',name:'Продвинутый',cost:800,minPrice:20,maxPrice:200,icon:'💼'},
        {id:'gold',name:'Золотой',cost:1200,minPrice:30,maxPrice:300,icon:'🥇'},
        {id:'platinum',name:'Платиновый',cost:2000,minPrice:40,maxPrice:500,icon:'🪩'},
        {id:'luxury',name:'Люксовый',cost:3000,minPrice:50,maxPrice:800,icon:'👑'},
        {id:'diamond',name:'Алмазный',cost:5000,minPrice:60,maxPrice:1200,icon:'💎'},
        {id:'crystal',name:'Хрустальный',cost:7000,minPrice:80,maxPrice:1800,icon:'🔮'},
        {id:'mystic',name:'Мистический',cost:10000,minPrice:100,maxPrice:2500,icon:'🌀'},
        {id:'premium',name:'Премиум',cost:15000,minPrice:150,maxPrice:3500,icon:'👁️'},
        {id:'shadow',name:'Теневой',cost:18000,minPrice:200,maxPrice:4500,icon:'🌑'},
        {id:'divine',name:'Божественный',cost:25000,minPrice:300,maxPrice:6000,icon:'☀️'},
        {id:'infernal',name:'Инфернальный',cost:35000,minPrice:500,maxPrice:8000,icon:'👹'},
        {id:'minecraft',name:'Майнкрафт',cost:1200,minPrice:100,maxPrice:500,icon:'⛏️'},
        {id:'cyberpunk',name:'Киберпанк',cost:5000,minPrice:200,maxPrice:1200,icon:'🤖'},
        {id:'pokemon',name:'Покемоны',cost:2200,minPrice:80,maxPrice:600,icon:'⚡'},
        {id:'zelda',name:'Зельда',cost:4000,minPrice:150,maxPrice:1000,icon:'🗡️'},
        {id:'mario',name:'Марио',cost:800,minPrice:40,maxPrice:200,icon:'🍄'},
        {id:'halo',name:'Хало',cost:8500,minPrice:250,maxPrice:2000,icon:'🛡️'},
        {id:'witcher',name:'Ведьмак',cost:6000,minPrice:200,maxPrice:1500,icon:'🐺'},
        {id:'skyrim',name:'Скайрим',cost:5500,minPrice:180,maxPrice:1300,icon:'🐉'},
