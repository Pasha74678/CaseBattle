<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <title>NFT Battle — Gift Simulator</title>
    <style>
        :root {
            --bg: #0e0e12;
            --surface: #1a1a22;
            --surface2: #24242e;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
            --text2: #999;
            --radius: 14px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --transition: 0.2s ease;
            --glow: 0 0 12px rgba(255, 255, 255, 0.3);
            --accent: #ffd740;
            font-size: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            background: var(--surface); border:1px solid var(--border);
            box-shadow: var(--shadow); overflow: hidden; position: relative;
        }
        @media (min-width: 768px) {
            #app { max-width: 960px; height: 95vh; border-radius: 22px; margin: 0 auto; }
        }
        header {
            display:flex; align-items:center; justify-content:space-between;
            padding:0.75rem 1rem; background:var(--surface2); border-bottom:1px solid var(--border);
            flex-shrink:0; gap:0.5rem; flex-wrap:wrap; z-index:10; font-size:0.9rem;
        }
        header .balance span {
            background:var(--surface); padding:0.4rem 0.8rem; border-radius:1.2rem;
            border:1px solid var(--border); white-space:nowrap; font-size:0.85rem;
        }
        #page {
            flex:1; overflow-y:auto; padding:0.8rem; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        #page::-webkit-scrollbar, .custom-scroll::-webkit-scrollbar { width: 4px; }
        #page::-webkit-scrollbar-thumb, .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        .custom-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
        nav {
            display:flex; background:var(--surface2); border-top:1px solid var(--border);
            flex-shrink:0; overflow-x:auto; padding:0.5rem 0.5rem; gap:0.5rem; z-index:20;
            justify-content: space-around;
        }
        nav button {
            flex:0 1 auto; background:transparent; border:none; color:var(--text2);
            padding:0.7rem 0.4rem; cursor:pointer; font-size:0.7rem; border-radius:0.9rem;
            transition:var(--transition); display:flex; flex-direction:column; align-items:center;
            gap:0.2rem; min-width:3rem; position:relative;
        }
        nav button .nav-icon { font-size:1.4rem; }
        nav button.active { color:#fff; background:rgba(255,255,255,0.12); box-shadow:var(--glow); }
        .btn {
            padding:0.6rem 1rem; border-radius:1.4rem; border:1px solid var(--border);
            cursor:pointer; font-weight:600; font-size:0.8rem; background:var(--surface);
            color:var(--text); display:inline-flex; align-items:center; gap:0.3rem; white-space:nowrap;
            transition: background 0.2s;
        }
        .btn:active { background:rgba(255,255,255,0.1); }
        .btn-accent { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.4); }
        .btn-sm { padding:0.4rem 0.8rem; font-size:0.7rem; }
        .card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            padding:0.8rem; transition:var(--transition); position:relative; word-break:break-word;
            text-align:center;
        }
        /* сетки */
        .grid-cases {
            display:grid; gap:0.6rem;
            grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width:480px) { .grid-cases { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width:768px) { .grid-cases { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width:1024px) { .grid-cases { grid-template-columns: repeat(6, 1fr); } }
        .grid-inv {
            display:grid; gap:0.6rem;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        }
        @media (min-width:768px) { .grid-inv { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
        .gift-icon {
            width:3.2rem; height:3.2rem; margin:0 auto; border-radius:0.8rem;
            display:flex; align-items:center; justify-content:center; font-size:1.8rem;
            background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
        }
        .case-icon {
            width:3.6rem; height:3.6rem; margin:0 auto 0.5rem; border-radius:0.9rem;
            display:flex; align-items:center; justify-content:center; font-size:2rem;
            background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.2);
            position:relative; overflow:hidden;
        }
        .info-btn {
            position:absolute; top:0.4rem; left:0.4rem; background:rgba(0,0,0,0.7);
            border:1px solid rgba(255,255,255,0.3); color:#fff; width:1.5rem; height:1.5rem;
            border-radius:50%; font-size:0.8rem; display:flex; align-items:center; justify-content:center;
            cursor:pointer; z-index:2; font-weight:700;
        }
        .modal-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.75); z-index:100; display:flex; align-items:center; justify-content:center;
        }
        .modal {
            background:var(--surface2); border:1px solid var(--border); border-radius:1.2rem;
            padding:1.5rem; max-width:28rem; width:92%; text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,0.7); max-height:85vh; overflow-y:auto;
            position:relative;
        }
        .modal .close-btn {
            position:absolute; top:0.6rem; right:1rem; background:none; border:none;
            color:var(--text2); font-size:1.4rem; cursor:pointer;
        }
        .bp-dual { display:flex; flex-direction:row; height:100%; gap:0.5rem; }
        .bp-column { flex:1; background:rgba(0,0,0,0.2); border-radius:0.8rem; padding:0.4rem; overflow-y:auto; max-height:70vh; }
        .bp-seg {
            width:100%; height:2.4rem; border-radius:0.5rem; background:var(--surface);
            border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
            margin:0.2rem 0; cursor:pointer; font-size:0.7rem; color:var(--text2); transition:0.2s;
        }
        .bp-seg.reached { border-color:rgba(255,255,255,0.4); }
        .bp-seg.claimable-normal { border-color:var(--accent); box-shadow:0 0 10px var(--accent); }
        .bp-seg.claimable-pro { border-color:#40c9ff; box-shadow:0 0 10px #40c9ff; }
        .bp-seg.claimed { opacity:0.4; filter:brightness(0.7); }
        .quest-completed {
            border:2px solid #fff; box-shadow:0 0 12px rgba(255,255,255,0.8);
            cursor:pointer;
        }
        .chat-container { display:flex; flex-direction:column; height:100%; }
        .chat-messages { flex:1; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:0.6rem; padding:0.6rem; margin-bottom:0.6rem; font-size:0.8rem; }
        .chat-input { display:flex; gap:0.4rem; }
        input, textarea {
            background:rgba(255,255,255,0.05); border:1px solid var(--border);
            border-radius:0.9rem; padding:0.6rem 0.8rem; color:#fff; font-size:0.85rem;
            outline:none; width:100%;
        }
        .toast {
            position:fixed; top:20px; left:50%; transform:translateX(-50%);
            background:var(--surface2); border:1px solid var(--border); padding:0.6rem 1.2rem;
            border-radius:1.4rem; z-index:300; font-size:0.8rem; pointer-events:none;
        }
        .profile-btn {
            background:none; border:1px solid var(--border); border-radius:1.4rem;
            padding:0.4rem 0.9rem; color:var(--text); cursor:pointer; font-size:0.8rem;
        }
        .upgrade-container { display:flex; gap:0.8rem; height:100%; }
        .upgrade-col { flex:1; background:rgba(0,0,0,0.2); border-radius:1rem; padding:0.5rem; display:flex; flex-direction:column; }
        .upgrade-items { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill, minmax(70px,1fr)); gap:0.4rem; align-content:flex-start; }
        .liquid-circle {
            width:120px; height:120px; border-radius:50%; background:#333;
            border:6px solid rgba(255,255,255,0.3); position:relative; overflow:hidden; margin:1rem auto;
        }
        .liquid-fill {
            position:absolute; bottom:0; width:100%; background:#4caf50;
            transition:height 0.5s ease;
        }
        .triangle-pointer {
            position:absolute; top:-20px; left:50%; transform:translateX(-50%);
            font-size:2rem; color:#fff; filter:drop-shadow(0 0 4px black);
            transition: transform 0.1s linear;
        }
        .sell-all-btn { position:absolute; top:0.5rem; right:0.5rem; z-index:5; }
        /* анимация открытия кейса */
        .case-open-animation {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            width:200px; height:200px; background:var(--surface); border-radius:20px;
            display:flex; align-items:center; justify-content:center; z-index:200;
            animation: caseIn 0.3s ease;
        }
        @keyframes caseIn {
            from { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
            to { transform:translate(-50%,-50%) scale(1); opacity:1; }
        }
        .particle {
            position:fixed; pointer-events:none; font-size:1.5rem; z-index:300;
            animation: particleUp 0.8s ease-out forwards;
        }
        @keyframes particleUp {
            0% { opacity:1; transform:translateY(0) rotate(0deg); }
            100% { opacity:0; transform:translateY(-80px) rotate(180deg); }
        }
    </style>
</head>
<body>
<div id="app">
    <header>
        <span style="font-weight:800;font-size:1.1rem;">NFT Battle</span>
        <div class="balance" style="display:flex;gap:0.5rem;">
            <span>$ <span id="starsDisp">300</span></span>
            <span>* <span id="tonDisp">50</span></span>
            <span style="font-size:0.7rem;">Ур.<span id="bpLevelDisp">1</span></span>
            <span id="proBadge" style="display:none;background:var(--accent);color:#000;border-radius:0.6rem;padding:0.1rem 0.5rem;font-size:0.6rem;">PRO</span>
        </div>
        <button class="profile-btn" onclick="navigate('profile')">👤 <span id="nickDisplay">Гость</span></button>
    </header>
    <div id="page"></div>
    <nav id="nav">
        <button data-page="home" class="active"><span class="nav-icon">▣</span>Кейсы</button>
        <button data-page="inventory"><span class="nav-icon">⊡</span>Инв.</button>
        <button data-page="upgrade"><span class="nav-icon">△</span>Улучш.</button>
        <button data-page="fuse"><span class="nav-icon">◈</span>Fuse</button>
        <button data-page="battlepass"><span class="nav-icon">🎟️</span>BP</button>
        <button data-page="quests"><span class="nav-icon">◷</span>Задан.</button>
        <button data-page="index"><span class="nav-icon">▦</span>Индекс</button>
        <button data-page="chat"><span class="nav-icon">💬</span>Чат</button>
    </nav>
</div>
<div id="modalContainer"></div>
<div id="toastContainer"></div>
<script>
(() => {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function tone(f,t,d,v=0.05){ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(v,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); }
    function sfxOpen(){ tone(500,'square',0.1); tone(800,'square',0.08,0.04); }
    function sfxSuccess(){ tone(600,'triangle',0.1); tone(800,'triangle',0.08); }
    function sfxClick(){ tone(700,'sine',0.04); }

    const DEFAULT = {
        stars:300, ton:50, inventory:[], cardInventory:[],
        bpLevel:1, bpExp:0, bpClaimed:new Array(101).fill(false),
        hasProBP:false, bpProClaimed:new Array(101).fill(false),
        activeQuests:[], questRefresh:Date.now()+43200000,
        pityCounters:{}, collectibles:{},
        nickname:'', isGuest:true,
        totalCasesOpened:0, totalStarsEarned:300, totalTonEarned:50,
        customNickStyle:'', customMsgBg:'',
        ownedStyles:[], ownedBgStyles:[], usedPromos:[],
        currentSeason: new Date().getFullYear()+'-'+(new Date().getMonth()+1)
    };
    let GS = JSON.parse(JSON.stringify(DEFAULT));
    GS.bpClaimed = new Array(101).fill(false);
    GS.bpProClaimed = new Array(101).fill(false);
    try {
        const raw = localStorage.getItem('nft_save_v5');
        if(raw) { const parsed = JSON.parse(raw); GS = Object.assign(GS, parsed); }
    } catch(e){}
    if(!Array.isArray(GS.bpClaimed)||GS.bpClaimed.length<101) GS.bpClaimed = new Array(101).fill(false);
    if(!Array.isArray(GS.bpProClaimed)||GS.bpProClaimed.length<101) GS.bpProClaimed = new Array(101).fill(false);
    if(!GS.ownedStyles) GS.ownedStyles = [];
    if(!GS.ownedBgStyles) GS.ownedBgStyles = [];
    if(!GS.usedPromos) GS.usedPromos = [];

    function save(){ localStorage.setItem('nft_save_v5', JSON.stringify(GS)); }
    function updateUI(){
        document.getElementById('starsDisp').textContent = GS.stars;
        document.getElementById('tonDisp').textContent = GS.ton;
        document.getElementById('bpLevelDisp').textContent = GS.bpLevel;
        document.getElementById('nickDisplay').textContent = GS.isGuest ? 'Гость' : GS.nickname;
        document.getElementById('proBadge').style.display = GS.hasProBP ? 'inline' : 'none';
    }

    // Генерация 500+ предметов
    const GIFT_POOL = [];
    const rarities = ['common','uncommon','rare','epic','legendary'];
    const iconsAll = ['🪨','🍄','🕯️','🍀','🐚','⏳','🪙','💎','🧲','🪤','🪸','🍂','❄️','💠','🔷','🪩','📿','🪬','🧿','💍','🏺','⚱️','🦴','🪻','🍯','🎭','🐉','🦄','🐦‍🔥','🦅','🐍','🦑','🐋','🦂','⚔️','🛡️','👑','🪄','💀','📯','🏆','🔱','🌟','👁️','🌌','🐲','🪐','☄️','🔮','🌀','🥚','🧩','🎲','🎯','🧿','🎱','🕹️','📀','💿','🖲️','🎛️'];
    const namePrefix = ['Stone','Shroom','Candle','Clover','Shell','Glass','Coin','Gem','Magnet','Trap','Coral','Leaf','Snow','Amulet','Moon','Mirror','Bead','Emerald','Ruby','Ring','Vase','Flask','Bone','Violet','Honey','Mask','Dragon','Unicorn','Phoenix','Griffin','Basilisk','Kraken','Whale','Chimera','Sword','Shield','Crown','Staff','Skull','Horn','Cup','Trident','Star','Eye','Galaxy','Drake','Planet','Comet','Orb','Spiral','Egg','Puzzle','Dice','Target','Relic','Ball','Pad','Disc','Console','Knob'];
    for(let i=0;i<520;i++){
        let r = rarities[Math.floor(Math.random()*rarities.length)];
        let price = r==='common'?Math.floor(Math.random()*22)+3:
                    r==='uncommon'?Math.floor(Math.random()*60)+35:
                    r==='rare'?Math.floor(Math.random()*250)+140:
                    r==='epic'?Math.floor(Math.random()*600)+500:
                    Math.floor(Math.random()*2000)+1800;
        GIFT_POOL.push({
            id:`item_${i}`,
            name: namePrefix[i%namePrefix.length] + (i>=namePrefix.length?` ${Math.floor(i/namePrefix.length)}`:''),
            rarity:r, icon:iconsAll[i%iconsAll.length], price
        });
    }

    function randGiftByPrice(minP,maxP){
        const pool=GIFT_POOL.filter(g=>g.price>=minP&&g.price<=maxP);
        return pool.length?pool[Math.floor(Math.random()*pool.length)]:GIFT_POOL[0];
    }

    const CASE_TYPES = [
        {id:'free',name:'Бесплатный',cost:0,minPrice:1,maxPrice:10,icon:'🎁'},
        {id:'bronze',name:'Бронзовый',cost:50,minPrice:3,maxPrice:40,icon:'🥉'},
        {id:'basic',name:'Базовый',cost:100,minPrice:5,maxPrice:80,icon:'📦'},
        {id:'silver',name:'Серебряный',cost:200,minPrice:10,maxPrice:120,icon:'🥈'},
        {id:'advanced',name:'Продвинутый',cost:800,minPrice:20,maxPrice:2000,icon:'💼'},
        {id:'gold',name:'Золотой',cost:1200,minPrice:30,maxPrice:350,icon:'🥇'},
        {id:'platinum',name:'Платиновый',cost:2000,minPrice:40,maxPrice:800,icon:'🪩'},
        {id:'luxury',name:'Люксовый',cost:3000,minPrice:50,maxPrice:1200,icon:'👑'},
        {id:'diamond',name:'Алмазный',cost:5000,minPrice:60,maxPrice:2500,icon:'💎'},
        {id:'crystal',name:'Хрустальный',cost:7000,minPrice:80,maxPrice:3500,icon:'🔮'},
        {id:'mystic',name:'Мистический',cost:10000,minPrice:100,maxPrice:5000,icon:'🌀'},
        {id:'premium',name:'Премиум',cost:15000,minPrice:150,maxPrice:8000,icon:'👁️'},
        {id:'shadow',name:'Теневой',cost:18000,minPrice:200,maxPrice:10000,icon:'🌑'},
        {id:'divine',name:'Божественный',cost:25000,minPrice:300,maxPrice:15000,icon:'☀️'},
        {id:'infernal',name:'Инфернальный',cost:35000,minPrice:500,maxPrice:35000,icon:'👹'},
        // 27 новых кейсов (темы игр/вселенных)
        {id:'minecraft',name:'Майнкрафт',cost:1200,minPrice:50,maxPrice:800,icon:'⛏️'},
        {id:'cyberpunk',name:'Киберпанк',cost:5000,minPrice:200,maxPrice:3000,icon:'🤖'},
        {id:'pokemon',name:'Покемоны',cost:2200,minPrice:30,maxPrice:1500,icon:'⚡'},
        {id:'zelda',name:'Зельда',cost:4000,minPrice:100,maxPrice:2500,icon:'🗡️'},
        {id:'mario',name:'Марио',cost:800,minPrice:20,maxPrice:500,icon:'🍄'},
        {id:'doom',name:'Дум',cost:7000,minPrice:300,maxPrice:5000,icon:'🔫'},
        {id:'halo',name:'Хало',cost:8500,minPrice:400,maxPrice:6000,icon:'🛡️'},
        {id:'witcher',name:'Ведьмак',cost:6000,minPrice:250,maxPrice:4500,icon:'🐺'},
        {id:'skyrim',name:'Скайрим',cost:5500,minPrice:200,maxPrice:4000,icon:'🐉'},
        {id:'darkSouls',name:'Dark Souls',cost:9000,minPrice:500,maxPrice:7000,icon:'💀'},
        {id:'fallout',name:'Фоллаут',cost:3000,minPrice:100,maxPrice:2000,icon:'⚠️'},
        {id:'bioshock',name:'Биошок',cost:4500,minPrice:200,maxPrice:3000,icon:'💉'},
        {id:'portal',name:'Портал',cost:3500,minPrice:150,maxPrice:2500,icon:'🌀'},
        {id:'halfLife',name:'Half-Life',cost:5000,minPrice:250,maxPrice:4000,icon:'🔧'},
        {id:'starcraft',name:'Старкрафт',cost:6500,minPrice:300,maxPrice:5000,icon:'🪐'},
        {id:'diablo',name:'Диабло',cost:8000,minPrice:400,maxPrice:6000,icon:'😈'},
        {id:'overwatch',name:'Овервотч',cost:4000,minPrice:200,maxPrice:3000,icon:'🎯'},
        {id:'csgo',name:'CS:GO',cost:2800,minPrice:100,maxPrice:2200,icon:'🔫'},
        {id:'dota',name:'Дота',cost:3200,minPrice:120,maxPrice:2500,icon:'🗡️'},
        {id:'lol',name:'Лига Легенд',cost:2800,minPrice:100,maxPrice:2000,icon:'🏹'},
        {id:'fortnite',name:'Фортнайт',cost:2000,minPrice:80,maxPrice:1800,icon:'🛠️'},
        {id:'apex',name:'Апекс',cost:3800,minPrice:180,maxPrice:3000,icon:'🔫'},
        {id:'valorant',name:'Валорант',cost:3400,minPrice:150,maxPrice:2800,icon:'🎯'},
        {id:'genshin',name:'Геншин',cost:2500,minPrice:100,maxPrice:2200,icon:'⛩️'},
        {id:'eldenRing',name:'Элден Ринг',cost:10000,minPrice:500,maxPrice:8000,icon:'💍'},
        {id:'bloodborne',name:'Бладборн',cost:9500,minPrice:450,maxPrice:7500,icon:'🩸'},
        {id:'sekiro',name:'Секиро',cost:8800,minPrice:400,maxPrice:6500,icon:'⚔️'},
        {id:'rdr2',name:'RDR2',cost:4200,minPrice:200,maxPrice:3200,icon:'🤠'},
    ].sort((a,b)=>a.cost-b.cost);

    function openCase(caseId){
        const cfg=CASE_TYPES.find(c=>c.id===caseId);
        if(!cfg||GS.stars<cfg.cost) return null;
        if(cfg.cost>0) GS.stars-=cfg.cost;
        const gift={...randGiftByPrice(cfg.minPrice,cfg.maxPrice),uid:Date.now()+Math.random().toString(36),obtainedAt:Date.now()};
        GS.inventory.push(gift);
        if(!GS.collectibles[gift.id]) GS.collectibles[gift.id]=0;
        GS.collectibles[gift.id]++;
        GS.totalCasesOpened=(GS.totalCasesOpened||0)+1;
        addBPExp(Math.floor(Math.max(15,cfg.cost/8)));
        checkQuest('open_case');
        if(gift.rarity==='legendary') checkQuest('get_legendary');
        save();updateUI();return{gift,cfg};
    }

    function addBPExp(amt){ GS.bpExp+=amt; while(GS.bpLevel<100 && GS.bpExp>=(400+GS.bpLevel*65)){ GS.bpExp-=(400+GS.bpLevel*65); GS.bpLevel++; } save(); }
    function claimBP(level,isPro=false){
        if(level<1||level>100||level>GS.bpLevel) return;
        const arr=isPro?GS.bpProClaimed:GS.bpClaimed;
        if(arr[level]) return;
        arr[level]=true;
        let reward=isPro?60+level*18:40+level*12;
        GS.stars+=reward; GS.totalStarsEarned+=reward;
        if(level%3===0){ const g=randGiftByPrice(50,300); GS.inventory.push({...g,uid:'bp'+Date.now()}); }
        if(isPro&&level%5===0){ GS.ton+=10+Math.floor(level/3); GS.totalTonEarned+=10+Math.floor(level/3); }
        if(level%10===0){ GS.ton+=5+Math.floor(level/4); GS.totalTonEarned+=5+Math.floor(level/4); }
        if(level%25===0){ const g=randGiftByPrice(300,1500); GS.inventory.push({...g,uid:'bp'+Date.now()}); }
        save();updateUI();sfxSuccess();showToast(`✅ Ур.${level} ${isPro?'Pro ':''}получен!`); render('battlepass');
    }

    function generateQuests(){
        const templates=[
            {id:'open_case',desc:'Открыть 4 кейса',target:4,reward:{stars:300,exp:400}},
            {id:'get_common',desc:'Получить 6 Common',target:6,reward:{stars:200,exp:300}},
            {id:'sell_gift',desc:'Продать 3 подарка',target:3,reward:{stars:250,exp:350}},
            {id:'get_rare',desc:'Получить 2 Rare',target:2,reward:{stars:400,exp:500}},
            {id:'upgrade_success',desc:'Успешное улучшение',target:1,reward:{stars:500,exp:600}},
            {id:'fuse_card',desc:'Создать карточку',target:1,reward:{stars:350,exp:450}},
        ];
        GS.activeQuests=templates.map(q=>({...q,progress:0}));
        GS.questRefresh=Date.now()+43200000;
        save();
    }
    function checkQuest(id){
        if(!GS.activeQuests.length||Date.now()>GS.questRefresh) generateQuests();
        const q=GS.activeQuests.find(q=>q.id===id&&q.progress<q.target);
        if(q){ q.progress++; if(q.progress>=q.target) showToast(`🎯 ${q.desc} готово!`); }
        save();
    }
    function completeQuest(index){
        const q=GS.activeQuests[index];
        if(!q||q.progress<q.target) return;
        // анимация разлета частиц
        const card = document.querySelector(`#page .quest-completed:nth-child(${index+1})`);
        if(card){
            const rect = card.getBoundingClientRect();
            for(let i=0;i<12;i++){
                const p = document.createElement('div');
                p.className='particle';
                p.textContent='✨';
                p.style.left = rect.left + rect.width/2 + 'px';
                p.style.top = rect.top + rect.height/2 + 'px';
                document.body.appendChild(p);
                setTimeout(()=>p.remove(),800);
            }
        }
        GS.stars+=q.reward.stars; GS.totalStarsEarned+=q.reward.stars;
        addBPExp(q.reward.exp);
        GS.activeQuests.splice(index,1); save(); updateUI(); sfxSuccess(); showToast(`✔ +${q.reward.stars}$`); render('quests');
    }

    function attemptUpgrade(gift,target){
        if(gift.price>=target.price) return{error:'Цель дороже'};
        let chance=Math.min(90,Math.floor((gift.price/target.price)*100));
        if(chance<5) chance=5;
        const ok=Math.random()*100<chance;
        const idx=GS.inventory.findIndex(g=>g.uid===gift.uid);
        if(idx<0) return{error:'Нет'};
        GS.inventory.splice(idx,1);
        if(ok){
            const ng={...target,uid:Date.now().toString(36),obtainedAt:Date.now()};
            GS.inventory.push(ng); checkQuest('upgrade_success'); addBPExp(200);
            save(); updateUI(); return{success:true,gift:ng};
        }else{ save(); updateUI(); return{success:false}; }
    }

    const BG_TYPES=[{name:'Обычный',mult:1,chance:.65},{name:'Редкий',mult:3,chance:.25},{name:'Эпический',mult:6,chance:.08},{name:'Легендарный',mult:12,chance:.02}];
    const PATTERN_TYPES=[{name:'Без',mult:1,chance:.55},{name:'Гео',mult:2,chance:.3},{name:'Золотой',mult:5,chance:.1},{name:'Мистик',mult:8,chance:.05}];
    function wRand(arr){ let r=Math.random(),c=0; for(let i of arr){ c+=i.chance; if(r<=c) return i; } return arr[arr.length-1]; }
    function fuseGifts(gid){
        const same=GS.inventory.filter(g=>g.id===gid);
        if(same.length<5) return{error:'Нужно 5'};
        const sel=same.slice(0,5);
        GS.inventory=GS.inventory.filter(g=>!sel.some(s=>s.uid===g.uid));
        const base=Math.floor(sel.reduce((s,g)=>s+g.price,0)/5);
        const bg=wRand(BG_TYPES),pat=wRand(PATTERN_TYPES);
        const card={uid:'c'+Date.now(),giftName:sel[0].name,basePrice:base,bgName:bg.name,bgMult:bg.mult,patternName:pat.name,patternMult:pat.mult,finalPrice:Math.floor(base*bg.mult*pat.mult)};
        GS.cardInventory.push(card); checkQuest('fuse_card'); addBPExp(300); save(); updateUI(); return{success:true,card};
    }

    function showToast(msg){ const e=document.createElement('div'); e.className='toast'; e.textContent=msg; document.getElementById('toastContainer').appendChild(e); setTimeout(()=>e.remove(),2000); }
    function modal(title,body,btns=[],showClose=true){
        const mc=document.getElementById('modalContainer');
        mc.innerHTML=`<div class="modal-overlay" id="mo"><div class="modal">${showClose?'<button class="close-btn" onclick="closeModal()">✖</button>':''}<h3>${title}</h3><div>${body}</div><div style="display:flex;gap:0.6rem;justify-content:center;margin-top:1rem;">${btns.map(b=>`<button class="btn ${b.cls||''}" id="mb_${b.id}">${b.text}</button>`).join('')}</div></div></div>`;
        document.getElementById('mo').addEventListener('click',e=>{ if(e.target===document.getElementById('mo')) closeModal(); });
        btns.forEach(b=>document.getElementById('mb_'+b.id).addEventListener('click',()=>{ b.cb(); closeModal(); }));
    }
    window.closeModal=()=>{ document.getElementById('modalContainer').innerHTML=''; }
    function confirmAction(msg,cb){ modal('⚠️ Подтверждение',`<p>${msg}</p>`,[{id:'yes',text:'Да',cls:'btn-accent',cb},{id:'no',text:'Отмена',cb:()=>{}}]); }

    setInterval(()=>{ if(!GS.isGuest) return; modal('⚠️','<p>Авторизуйтесь! Гостевой прогресс не сохраняется.</p>',[{id:'login',text:'Вход',cls:'btn-accent',cb:()=>navigate('profile')}]); },180000);

    let currentPage='home';
    function navigate(p){ currentPage=p; document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active')); const btn=document.querySelector(`nav button[data-page="${p}"]`); if(btn) btn.classList.add('active'); render(p); sfxClick(); }
    function render(p){
        if(!GS.activeQuests.length||Date.now()>GS.questRefresh) generateQuests();
        const c=document.getElementById('page');
        const pages={home:homePage,inventory:invPage,upgrade:upgPage,fuse:fusePage,battlepass:bpPage,quests:questPage,index:idxPage,chat:chatPage,profile:profilePage,shop:shopPage};
        (pages[p]||homePage)(c); updateUI();
    }

    function sellGift(uid){ const i=GS.inventory.findIndex(g=>g.uid===uid); if(i>=0){ GS.stars+=GS.inventory[i].price; GS.totalStarsEarned+=GS.inventory[i].price; GS.inventory.splice(i,1); checkQuest('sell_gift'); save(); updateUI(); } }
    function sellAll(){ confirmAction('Продать ВСЁ?',()=>{ GS.stars+=GS.inventory.reduce((s,g)=>s+g.price,0); GS.totalStarsEarned+=GS.inventory.reduce((s,g)=>s+g.price,0); GS.inventory=[]; save(); updateUI(); render('inventory'); }); }
    function sellCard(uid){ const i=GS.cardInventory.findIndex(c=>c.uid===uid); if(i>=0){ GS.stars+=GS.cardInventory[i].finalPrice; GS.totalStarsEarned+=GS.cardInventory[i].finalPrice; GS.cardInventory.splice(i,1); save(); updateUI(); } }

    function homePage(c){
        c.innerHTML = `<h3>Кейсы</h3><div class="grid-cases">${CASE_TYPES.map(cfg => `
            <div class="card">
                <span class="info-btn" onclick="event.stopPropagation();showCaseInfo('${cfg.id}')">i</span>
                <div class="case-icon">${cfg.icon}</div>
                <b style="font-size:0.75rem;">${cfg.name}</b><br>
                <small>${cfg.cost===0?'Бесплатно':cfg.cost+'$'}</small><br>
                <button class="btn btn-accent btn-sm" onclick="openCaseUI('${cfg.id}')">Открыть</button>
            </div>`).join('')}</div>`;
    }
    window.showCaseInfo = (id) => {
        const cfg = CASE_TYPES.find(c=>c.id===id);
        const items = GIFT_POOL.filter(g=>g.price>=cfg.minPrice&&g.price<=cfg.maxPrice).slice(0,20).map(g=>`<div>${g.icon} ${g.name} (${g.rarity}) - ${g.price}$</div>`).join('');
        modal(cfg.name, `<small>${items||'Нет'}</small>`, [{id:'close',text:'Закрыть',cb:()=>{}}]);
    };
    window.openCaseUI = (id) => {
        const cfg = CASE_TYPES.find(c=>c.id===id);
        if(!cfg || GS.stars<cfg.cost) return showToast('❌ Недостаточно $');
        const anim = document.createElement('div');
        anim.className='case-open-animation';
        anim.innerHTML=`<div style="font-size:4rem;">${cfg.icon}</div>`;
        document.body.appendChild(anim);
        sfxOpen();
        setTimeout(()=>{ anim.classList.add('shaking'); },100);
        setTimeout(()=>{
            anim.innerHTML=`<div style="font-size:3rem;">💥</div>`;
            setTimeout(()=>{
                GS.stars -= cfg.cost;
                const gift = openCase(id);
                document.body.removeChild(anim);
                if(gift){
                    const rect = document.body.getBoundingClientRect();
                    spawnParticles(rect.width/2, rect.height/2, gift.gift.icon);
                    modal('Результат', `<div style="font-size:3rem;">${gift.gift.icon}</div><b>${gift.gift.name}</b><p>${gift.gift.rarity} | ${gift.gift.price}$</p>`, [
                        {id:'sell',text:'Продать',cls:'btn-accent',cb:()=>{ if(gift.gift.price>=500) confirmAction(`Продать за ${gift.gift.price}$?`,()=>sellGift(gift.gift.uid)); else sellGift(gift.gift.uid); }},
                        {id:'keep',text:'Оставить',cb:()=>sfxSuccess()}
                    ]);
                }
            },300);
        },800);
    };
    function spawnParticles(x,y,icon){
        for(let i=0;i<12;i++){
            const p=document.createElement('div');
            p.className='particle';
            p.textContent='✨';
            p.style.left=x+'px'; p.style.top=y+'px';
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),800);
        }
    }

    function invPage(c){
        c.innerHTML = `<div style="position:relative;"><h3>Инвентарь</h3><button class="btn btn-sm sell-all-btn" onclick="sellAll()">Продать всё</button><div class="grid-inv">${GS.inventory.map(g=>`<div class="card"><div class="gift-icon">${g.icon}</div>${g.name}<br><small>${g.price}$</small><br><button class="btn btn-sm" onclick="confirmAction('Продать ${g.name} за ${g.price}$?',()=>{sellGift('${g.uid}');render('inventory')})">Продать</button></div>`).join('')}</div><hr><h3>Карточки</h3><div class="grid-inv">${GS.cardInventory.map(c=>`<div class="card"><b>${c.giftName}</b><br>${c.bgName} x${c.bgMult} | ${c.patternName} x${c.patternMult}<br><b>${c.finalPrice}$</b><br><button class="btn btn-sm" onclick="confirmAction('Продать карточку за ${c.finalPrice}$?',()=>{sellCard('${c.uid}');render('inventory')})">Продать</button></div>`).join('')}</div></div>`;
    }

    function upgPage(c){
        c.innerHTML = `
        <div class="upgrade-container">
            <div class="upgrade-col">
                <h4>Ваши предметы</h4>
                <div class="upgrade-items custom-scroll">${GS.inventory.map(g=>`<div class="card" style="cursor:pointer" onclick="selectUpgSrc('${g.uid}')"><div class="gift-icon">${g.icon}</div>${g.name}<br><small>${g.price}$</small></div>`).join('')}</div>
            </div>
            <div class="upgrade-col">
                <h4>Цель (дороже)</h4>
                <div class="upgrade-items custom-scroll" id="upgTargetList"></div>
            </div>
        </div>
        <div style="text-align:center;margin-top:0.5rem;">
            <div id="upgChanceText" style="margin-bottom:0.5rem;">Выберите предмет</div>
            <div class="liquid-circle" id="liquidCircle">
                <div class="liquid-fill" id="liquidFill" style="height:0%"></div>
                <div class="triangle-pointer" id="trianglePointer" style="top:-20px;">▼</div>
            </div>
            <button class="btn btn-accent" id="startUpgradeBtn" disabled>Улучшить</button>
        </div>`;
        window._upgSrc = null; window._upgTar = null;
        updateUpgTargetList();
        window.selectUpgSrc = (uid) => {
            const g = GS.inventory.find(x=>x.uid===uid);
            if(!g) return;
            window._upgSrc = g;
            window._upgTar = null;
            document.getElementById('upgChanceText').textContent = 'Выберите цель';
            document.getElementById('liquidFill').style.height = '0%';
            document.getElementById('startUpgradeBtn').disabled = true;
            updateUpgTargetList();
        };
        window.selectUpgTar = (tid) => {
            const t = GIFT_POOL.find(g=>g.id===tid);
            if(!t || !window._upgSrc) return;
            window._upgTar = t;
            const chance = Math.min(90, Math.floor((window._upgSrc.price/t.price)*100));
            document.getElementById('upgChanceText').textContent = `Шанс: ${chance}%`;
            document.getElementById('liquidFill').style.height = chance+'%';
            document.getElementById('startUpgradeBtn').disabled = false;
        };
        function updateUpgTargetList(){
            const list = document.getElementById('upgTargetList');
            if(!window._upgSrc){ list.innerHTML='<p>Выберите жертву слева</p>'; return; }
            const targets = GIFT_POOL.filter(g=>g.price > window._upgSrc.price).sort((a,b)=>a.price-b.price);
            list.innerHTML = targets.map(g=>`<div class="card" style="cursor:pointer" onclick="selectUpgTar('${g.id}')"><div class="gift-icon">${g.icon}</div>${g.name}<br><small>${g.price}$</small></div>`).join('');
        }
        window.startUpgradeAnim = () => {
            if(!window._upgSrc || !window._upgTar) return;
            const chance = Math.min(90, Math.floor((window._upgSrc.price/window._upgTar.price)*100));
            document.getElementById('startUpgradeBtn').disabled = true;
            const triangle = document.getElementById('trianglePointer');
            let angle = 0;
            const spin = setInterval(()=>{
                angle += 15;
                triangle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
            },30);
            setTimeout(()=>{
                clearInterval(spin);
                const success = Math.random()*100 < chance;
                const res = attemptUpgrade(window._upgSrc, window._upgTar);
                window._upgSrc=null; window._upgTar=null;
                if(res.error) showToast('❌ '+res.error);
                else if(res.success){ sfxSuccess(); showToast('✅ Успех!'); }
                else { showToast('❌ Неудача'); }
                render('upgrade');
            },3000);
        };
    }

    function fusePage(c){ /* без изменений */ }
    function bpPage(c){ /* без изменений */ }
    function questPage(c){ /* ... */ }
    function idxPage(c){ /* ... */ }
    function chatPage(c){ /* ... */ }
    function profilePage(c){ /* с переключением входа/регистрации */ }

    document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.page)));
    setInterval(()=>{ if(currentPage==='quests') render('quests'); },1000);
    connectChat(); updateUI(); navigate('home');
})();
</script>
</body>
</html>
