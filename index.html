<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <title>Gift Battle</title>
    <style>
        :root {
            --bg: #0e0e12;
            --surface: #1a1a22;
            --surface2: #24242e;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e0e0e0;
            --accent: #ffd740;
            --radius: 14px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            --transition: 0.2s ease;
            font-size: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            background: var(--surface); border:1px solid var(--border);
            box-shadow: var(--shadow); overflow: hidden; position: relative;
            backdrop-filter: blur(10px);
        }
        /* Статичные звёзды */
        #app::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 85% 45%, rgba(255,255,255,0.7), transparent),
                radial-gradient(2px 2px at 30% 75%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 70% 15%, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 95% 80%, rgba(255,255,255,0.9), transparent),
                radial-gradient(2px 2px at 50% 90%, rgba(255,255,255,0.75), transparent),
                radial-gradient(2px 2px at 15% 55%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 40% 30%, rgba(255,255,255,0.9), transparent);
            pointer-events: none;
        }
        @media (min-width: 768px) {
            #app { max-width: 960px; height: 95vh; border-radius: 22px; margin: 0 auto; }
        }
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 1rem; background: var(--surface2); border-bottom: 1px solid var(--border);
            flex-shrink: 0; gap: 0.5rem; flex-wrap: wrap; z-index: 10; font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        header .balance span {
            background: var(--surface); padding: 0.4rem 0.8rem; border-radius: 1.2rem;
            border: 1px solid var(--border); white-space: nowrap; font-size: 0.85rem;
        }
        #page {
            flex: 1; overflow-y: auto; padding: 0.8rem; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        /* Кастомный скроллбар */
        #page::-webkit-scrollbar,
        .custom-scroll::-webkit-scrollbar,
        .modal::-webkit-scrollbar { width: 4px; height: 4px; }
        #page::-webkit-scrollbar-thumb,
        .custom-scroll::-webkit-scrollbar-thumb,
        .modal::-webkit-scrollbar-thumb {
            background: transparent; border-radius: 4px; transition: background 0.3s ease;
        }
        #page:hover::-webkit-scrollbar-thumb,
        .custom-scroll:hover::-webkit-scrollbar-thumb,
        .modal:hover::-webkit-scrollbar-thumb,
        .is-scrolling::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }
        #page, .custom-scroll, .modal {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }
        nav {
            display: flex; background: var(--surface2); border-top: 1px solid var(--border);
            flex-shrink: 0; overflow-x: auto; padding: 0.5rem 0.5rem; gap: 0.5rem; z-index: 20;
            justify-content: space-around;
            backdrop-filter: blur(10px);
        }
        nav button {
            flex: 0 1 auto; background: transparent; border: none; color: var(--text);
            padding: 0.7rem 0.4rem; cursor: pointer; font-size: 0.7rem; border-radius: 0.9rem;
            transition: var(--transition); display: flex; flex-direction: column; align-items: center;
            gap: 0.2rem; min-width: 3rem; position: relative;
        }
        nav button .nav-icon { font-size: 1.4rem; }
        nav button.active { color: #fff; background: rgba(255,255,255,0.12); }
        .btn {
            padding: 0.6rem 1rem; border-radius: 1.4rem; border: 1px solid var(--border);
            cursor: pointer; font-weight: 600; font-size: 0.8rem; background: var(--surface);
            color: var(--text); display: inline-flex; align-items: center; gap: 0.3rem; white-space: nowrap;
            transition: background 0.2s;
            backdrop-filter: blur(10px);
        }
        .btn:active { background: rgba(255,255,255,0.1); }
        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }
        .btn-accent:active { background: rgba(255, 215, 64, 0.8); }
        .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 5px rgba(255,255,255,0.1) inset;
            border-radius: var(--radius);
            padding: 0.8rem; transition: var(--transition); position: relative; word-break: break-word;
            text-align: center; color: var(--text);
        }
        .grid-cases {
            display: grid; gap: 0.6rem; grid-template-columns: repeat(2, 1fr);
        }
        @media (min-width: 480px) { .grid-cases { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid-cases { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid-cases { grid-template-columns: repeat(6, 1fr); } }
        .grid-cases .card b {
            font-size: 0.7rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            max-width: 100%;
        }
        .grid-inv {
            display: grid; gap: 0.6rem; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        }
        @media (min-width: 768px) { .grid-inv { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
        .gift-icon {
            width: 3.2rem; height: 3.2rem; margin: 0 auto; border-radius: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
        }
        .gift-icon img { width: 100%; height: 100%; object-fit: contain; }
        .case-icon {
            width: 3.6rem; height: 3.6rem; margin: 0 auto 0.5rem; border-radius: 0.9rem;
            display: flex; align-items: center; justify-content: center; font-size: 2rem;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative; overflow: hidden;
        }
        .info-btn {
            position: absolute; top: 0.4rem; left: 0.4rem; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 1.5rem; height: 1.5rem;
            border-radius: 50%; font-size: 0.8rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 2; font-weight: 700;
        }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: rgba(36, 36, 46, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.2rem;
            padding: 1.5rem; max-width: 28rem; width: 92%; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 20px rgba(255,255,255,0.1) inset;
            max-height: 85vh; overflow-y: auto;
            position: relative;
        }
        .modal .close-btn {
            position: absolute; top: 0.6rem; right: 1rem; background: none; border: none;
            color: var(--text); font-size: 1.4rem; cursor: pointer;
        }
        .quest-completed {
            border: 2px solid var(--accent);
            cursor: pointer;
        }
        .toast-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 300;
            display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 8px;
            pointer-events: none;
        }
        .toast {
            background: var(--surface2); border: 1px solid var(--border); padding: 0.6rem 1.2rem;
            border-radius: 1.4rem; font-size: 0.8rem; color: var(--text); pointer-events: auto;
            box-shadow: var(--shadow); white-space: nowrap;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
        }
        @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }
        @media (max-width: 767px) { .toast-container { bottom: 80px; right: 10px; } }
        .case-reveal-modal { padding: 0 !important; background: var(--surface2); }
        .reveal-container {
            position: relative; overflow: hidden; border-radius: 1.2rem; background: var(--surface2);
        }
        .reveal-content { padding: 1.8rem; text-align: center; position: relative; z-index: 1; }
        .reveal-curtain {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--surface2); transition: transform 1.5s ease-out; will-change: transform; z-index: 2;
        }
        .reveal-buttons { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
        .profile-btn {
            background: none; border: 1px solid var(--border); border-radius: 1.4rem;
            padding: 0.4rem 0.9rem; color: var(--text); cursor: pointer; font-size: 0.8rem;
        }
        .upgrade-squares { display: flex; align-items: center; justify-content: center; gap: 2rem; flex: 1; min-height: 0; }
        .upgrade-square {
            width: clamp(90px, 25vw, 130px); height: clamp(90px, 25vw, 130px);
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            border: 2px dashed var(--border); border-radius: 1rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: border-color 0.2s; text-align: center; padding: 0.4rem; overflow: hidden; user-select: none;
        }
        .upgrade-square.selected { border: 2px solid var(--accent); border-style: solid; }
        .result-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 3rem; display: none; z-index: 5; pointer-events: none;
        }
        .liquid-circle {
            width: 168px; height: 168px; border-radius: 50%; background: #333;
            border: 3px solid rgba(255, 255, 255, 0.2); position: relative; overflow: hidden; margin: 0 auto;
        }
        .liquid-fill { position: absolute; bottom: 0; width: 100%; background: #4caf50; transition: height 0.5s ease; }
        .triangle-pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            font-size: 2rem; color: #fff; filter: drop-shadow(0 0 4px black); transition: transform 0.1s linear;
        }
        .inv-panel, .upgrade-panel {
            flex: 1 1 0; min-height: 0; display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: var(--radius); overflow: hidden;
        }
        .inv-panel > .panel-header, .upgrade-panel > .panel-header {
            padding: 0.5rem 0.8rem; font-weight: 600; font-size: 0.85rem; color: var(--text);
            border-bottom: 1px solid var(--border); text-align: center; background: var(--surface); flex-shrink: 0;
        }
        .inv-panel > .panel-body, .upgrade-panel > .panel-body {
            flex: 1; overflow-y: auto; padding: 0.4rem; display: grid; gap: 0.4rem; align-content: flex-start;
        }
        .inv-panel .panel-body { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
        @media (min-width: 768px) { .inv-panel .panel-body { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
        .fuse-layout { display: flex; flex-direction: column; height: 100%; gap: 0.8rem; }
        .fuse-card-preview {
            width: 120px; height: 160px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            border: 2px dashed var(--border); border-radius: 1rem;
            display: flex; align-items: center; justify-content: center; transition: border-color 0.3s;
        }
        .fuse-card-preview.ready { border-color: var(--accent); border-style: solid; }
        .fuse-slots { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .fuse-slot {
            width: 54px; height: 54px; border: 2px dashed var(--border); border-radius: 0.8rem;
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
            background: rgba(0,0,0,0.2); position: relative; transition: border-color 0.2s;
        }
        .fuse-slot.filled { border-style: solid; border-color: rgba(255,255,255,0.3); }
        .fuse-inventory {
            flex: 1; min-height: 0; display: flex; flex-direction: column;
            border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
        }
        .fuse-inventory .inv-header { padding: 0.4rem; text-align: center; border-bottom: 1px solid var(--border); background: var(--surface); font-weight: 600; }
        .fuse-inventory .inv-grid { flex: 1; overflow-y: auto; padding: 0.4rem; display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.3rem; align-content: flex-start; }
        .fuse-inventory .inv-grid .card { padding: 0.3rem; cursor: pointer; font-size: 0.65rem; }
        .fuse-fly { position: fixed; z-index: 250; pointer-events: none; transition: transform 1.5s ease-in-out, opacity 1.5s; }
        .card-pop { animation: cardPop 1s ease-out forwards; }
        @keyframes cardPop { 0% { transform: scale(0.1); opacity: 0; } 70% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .bp-wrapper { display: flex; flex-direction: column; height: 100%; gap: 0.5rem; }
        .bp-panel {
            flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; border-radius: var(--radius);
            overflow: hidden; position: relative; background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .bp-header { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0.8rem; font-weight: 700; font-size: 0.85rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .bp-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; display: flex; flex-direction: column; position: relative; }
        .bp-track { position: relative; display: flex; align-items: flex-end; min-width: 100%; height: 100%; padding: 0 20px; }
        .bp-fill { position: absolute; bottom: 20px; left: 20px; height: 6px; border-radius: 3px; transition: width 0.5s ease; }
        .bp-fill.normal { background: var(--accent); } .bp-fill.pro { background: #40c9ff; }
        .bp-nodes { display: flex; align-items: flex-end; gap: 24px; position: relative; z-index: 1; padding-bottom: 35px; }
        .bp-node { display: flex; flex-direction: column; align-items: center; width: 40px; flex-shrink: 0; }
        .bp-reward { font-size: 0.7rem; text-align: center; margin-bottom: 8px; color: var(--text); white-space: nowrap; }
        .bp-circle { width: 28px; height: 28px; border-radius: 50%; background: var(--surface); border: 2px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.7rem; transition: 0.2s; }
        .bp-circle.reached { border-color: rgba(255,255,255,0.4); background: var(--surface2); }
        .bp-circle.claimable { border-color: var(--accent); background: var(--accent); color: #000; cursor: pointer; }
        .bp-circle.claimed { opacity: 0.4; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
        .bp-locked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(4px); background: rgba(0,0,0,0.6); z-index: 10; display: flex; align-items: center; justify-content: center; }
        .bp-activate-btn { padding: 0.8rem 1.8rem; border-radius: 1.4rem; background: var(--accent); color: #000; font-weight: 700; border: none; cursor: pointer; font-size: 0.9rem; }
        .bp-scroll::-webkit-scrollbar { height: 4px; } .bp-scroll::-webkit-scrollbar-thumb { background: transparent; } .bp-scroll:hover::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<div id="app">
    <header>
        <span style="font-weight:800;font-size:1.1rem;">NFT Battle</span>
        <div class="balance" style="display:flex;gap:0.5rem;">
            <span>$ <span id="starsDisp">300</span></span>
            <span>* <span id="tonDisp">50</span></span>
            <span style="font-size:0.9rem;">lvl <span id="bpLevelDisp">1</span></span>
            <span id="proBadge" style="display:none;background:var(--accent);color:#000;border-radius:0.6rem;padding:0.1rem 0.5rem;font-size:0.6rem;">PRO</span>
        </div>
        <button class="profile-btn" onclick="UI.navigate('profile')">👤 <span id="nickDisplay">Гость</span></button>
    </header>
    <div id="page"></div>
    <nav id="nav">
        <button data-page="home" class="active"><span class="nav-icon">▣</span>Case</button>
        <button data-page="inventory"><span class="nav-icon">⊡</span>Inventory</button>
        <button data-page="upgrade"><span class="nav-icon">△</span>Upgrade</button>
        <button data-page="fuse"><span class="nav-icon">◈</span>Fuse</button>
        <button data-page="battlepass"><span class="nav-icon">🎟️</span>BattlePass</button>
        <button data-page="quests"><span class="nav-icon">◷</span>Task</button>
        <button data-page="index"><span class="nav-icon">▦</span>Index</button>
    </nav>
</div>
<div id="modalContainer"></div>
<div id="toastContainer" class="toast-container"></div>

<script>
// ========== AUDIO ==========
const Audio = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    tone(f,t,d,v=0.05){ const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(v,this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime+d); },
    open(){ this.tone(500,'square',0.1); this.tone(800,'square',0.08,0.04); },
    success(){ this.tone(600,'triangle',0.1); this.tone(800,'triangle',0.08); },
    click(){ this.tone(700,'sine',0.04); },
};

// ========== GAME STATE ==========
const GameState = {
    data: {
        stars: 300, ton: 50, inventory: [], cardInventory: [],
        bpLevel: 1, bpExp: 0, bpClaimed: new Array(101).fill(false),
        hasProBP: false, bpProClaimed: new Array(101).fill(false),
        activeQuests: [], questRefresh: Date.now() + 43200000,
        pityCounters: {}, collectibles: {},
        nickname: '', isGuest: true,
        totalCasesOpened: 0, totalStarsEarned: 300, totalTonEarned: 50,
        customNickStyle: '', customMsgBg: '',
        ownedStyles: [], ownedBgStyles: [], usedPromos: [],
        currentSeason: new Date().getFullYear() + '-' + (new Date().getMonth() + 1),
        activeDailyQuests: [], activeWeeklyQuests: [],
        dailyRefresh: Date.now() + 86400000, weeklyRefresh: Date.now() + 604800000,
    },
    init(){
        const saved = localStorage.getItem('nft_save_v9');
        if(saved){ try{ Object.assign(this.data, JSON.parse(saved)); }catch(e){} }
        if(!Array.isArray(this.data.bpClaimed)||this.data.bpClaimed.length<101) this.data.bpClaimed = new Array(101).fill(false);
        if(!Array.isArray(this.data.bpProClaimed)||this.data.bpProClaimed.length<101) this.data.bpProClaimed = new Array(101).fill(false);
        this.data.ownedStyles = this.data.ownedStyles || [];
        this.data.ownedBgStyles = this.data.ownedBgStyles || [];
        this.data.usedPromos = this.data.usedPromos || [];
        if (!this.data.activeDailyQuests || !Array.isArray(this.data.activeDailyQuests)) this.data.activeDailyQuests = [];
        if (!this.data.activeWeeklyQuests || !Array.isArray(this.data.activeWeeklyQuests)) this.data.activeWeeklyQuests = [];
        if (!this.data.dailyRefresh) this.data.dailyRefresh = Date.now() + 86400000;
        if (!this.data.weeklyRefresh) this.data.weeklyRefresh = Date.now() + 604800000;
        if (Quests.dailyPool.length === 0) Quests.initPools();
        if (!this.data.activeDailyQuests.length || Date.now() > this.data.dailyRefresh) Quests.generateDaily();
        if (!this.data.activeWeeklyQuests.length || Date.now() > this.data.weeklyRefresh) Quests.generateWeekly();
    },
    save(){ localStorage.setItem('nft_save_v9', JSON.stringify(this.data)); },
    get stars(){ return this.data.stars; },
    set stars(v){ this.data.stars = v; },
    get ton(){ return this.data.ton; },
    set ton(v){ this.data.ton = v; },
};

// ========== ПРЕДМЕТЫ (520 штук) ==========
const GIFT_POOL = [
    //{"id":"itm_001","name":"Каменная глыба","price":3,"icon":"img/items/stone.png","rarity":"common","case": "bronze"},
    //Простые предметы
  {"id":"itm_001","name":"Каменная глыба","price":3,"icon":"img/items/stone.png","rarity":"common"},
  {"id":"itm_002","name":"Лесной гриб","price":7,"icon":"img/items/mushroom.png","rarity":"common"},
  {"id":"itm_003","name":"Свеча духа","price":12,"icon":"img/items/candle.png","rarity":"common"},
  {"id":"itm_004","name":"Клевер удачи","price":5,"icon":"img/items/clover.png","rarity":"common"},
  {"id":"itm_005","name":"Морская ракушка","price":9,"icon":"img/items/shell.png","rarity":"common"},
  {"id":"itm_006","name":"Горсть песка","price":2,"icon":"img/items/sand.png","rarity":"common"},
  {"id":"itm_007","name":"Старая монета","price":18,"icon":"img/items/coin.png","rarity":"common"},
  {"id":"itm_008","name":"Кристалл кварца","price":25,"icon":"img/items/quartz.png","rarity":"uncommon"},

// ========== ФУНКЦИЯ ВЫБОРА ПРЕДМЕТА ==========
function randGiftForCase(minPrice, maxPrice, caseCost, caseId) {
    let pool = GIFT_POOL.filter(g => g.price >= minPrice && g.price <= maxPrice);
    if (caseId) {
        const caseItems = GIFT_POOL.filter(g => (g.case || '') === caseId && !pool.some(p => p.id === g.id));
        pool = pool.concat(caseItems);
    }
    if (!pool.length) return GIFT_POOL[0];
    if (caseCost === 0) return pool[Math.floor(Math.random() * pool.length)];
    const minProfitable = Math.ceil(caseCost * 1.1);
    const lossItems = pool.filter(g => g.price < caseCost);
    const profitItems = pool.filter(g => g.price >= minProfitable);
    if (!lossItems.length || !profitItems.length) {
        return pool[Math.floor(Math.random() * pool.length)];
    }
    return Math.random() < 0.75 ? lossItems[Math.floor(Math.random() * lossItems.length)] : profitItems[Math.floor(Math.random() * profitItems.length)];
}

// ========== ACTIONS ==========
const Actions = {
    openCase(caseId){
        const cfg = CASE_TYPES.find(c=>c.id===caseId);
        if(!cfg || GameState.stars < cfg.cost) return null;
        if(cfg.cost>0) GameState.stars -= cfg.cost;
        const gift = { ...randGiftForCase(cfg.minPrice, cfg.maxPrice, cfg.cost, cfg.id), uid: Date.now()+Math.random().toString(36), obtainedAt: Date.now() };
        GameState.data.inventory.push(gift);
        if(!GameState.data.collectibles[gift.id]) GameState.data.collectibles[gift.id]=0;
        GameState.data.collectibles[gift.id]++;
        GameState.data.totalCasesOpened++;
        this.addBPExp(Math.floor(Math.max(15, cfg.cost/8)));
        Quests.check('open_case');
        if(gift.rarity==='legendary') Quests.check('get_legendary_weekly');
        GameState.save(); UI.updateHeader();
        return {gift,cfg};
    },
    addBPExp(amt){
        GameState.data.bpExp += amt;
        while(GameState.data.bpLevel < 100 && GameState.data.bpExp >= (400 + GameState.data.bpLevel*65)){
            GameState.data.bpExp -= (400 + GameState.data.bpLevel*65);
            GameState.data.bpLevel++;
        }
        GameState.save();
    },
    claimBP(level, isPro=false){
        const arr = isPro ? GameState.data.bpProClaimed : GameState.data.bpClaimed;
        if(level<1||level>100||level>GameState.data.bpLevel||arr[level]) return;
        arr[level] = true;
        GameState.stars += isPro ? 60+level*18 : 40+level*12;
        GameState.data.totalStarsEarned += isPro ? 60+level*18 : 40+level*12;
        if(level%3===0) GameState.data.inventory.push({...randGiftForCase(50,300,0), uid:'bp'+Date.now()});
        if(isPro && level%5===0) GameState.data.ton += 10+Math.floor(level/3);
        if(level%10===0) GameState.data.ton += 5+Math.floor(level/4);
        if(level%25===0) GameState.data.inventory.push({...randGiftForCase(300,1500,0), uid:'bp'+Date.now()});
        GameState.save(); UI.updateHeader();
        Audio.success(); UI.toast(`✅ Ур.${level} получен!`); UI.render('battlepass');
    },
    sellGift(uid){
        const idx = GameState.data.inventory.findIndex(g=>g.uid===uid);
        if(idx<0) return;
        const gift = GameState.data.inventory[idx];
        GameState.stars += gift.price;
        GameState.data.totalStarsEarned += gift.price;
        GameState.data.inventory.splice(idx,1);
        Quests.check('sell_gift');
        GameState.save(); UI.updateHeader();
    },
    sellAll(){
        GameState.stars += GameState.data.inventory.reduce((s,g)=>s+g.price,0);
        GameState.data.totalStarsEarned += GameState.data.inventory.reduce((s,g)=>s+g.price,0);
        GameState.data.inventory = [];
        GameState.save(); UI.updateHeader(); UI.render('inventory');
    },
    upgrade(gift,target){
        if(gift.price >= target.price) return {error:'Цель должна быть дороже'};
        let chance = Math.min(90, Math.floor((gift.price/target.price)*100));
        if(chance<5) chance=5;
        const ok = Math.random()*100 < chance;
        const idx = GameState.data.inventory.findIndex(g=>g.uid===gift.uid);
        if(idx<0) return {error:'Предмет не найден'};
        GameState.data.inventory.splice(idx,1);
        if(ok){
            const ng = { ...target, uid: Date.now()+Math.random().toString(36), obtainedAt: Date.now() };
            GameState.data.inventory.push(ng);
            Quests.check('upgrade_success');
            this.addBPExp(200);
            GameState.save(); UI.updateHeader();
            return {success:true, gift:ng};
        } else {
            GameState.save(); UI.updateHeader();
            return {success:false};
        }
    },
};

// ========== QUESTS ==========
const Quests = {
    dailyPool: [], weeklyPool: [],
    initPools(){
        this.dailyPool = [];
        for (let i = 0; i < 50; i++) {
            const types = [
                { id:'open_case', desc:'Открыть кейсы', target: 3 + Math.floor(Math.random()*5), exp: 400 },
                { id:'get_common', desc:'Получить Common предметов', target: 5 + Math.floor(Math.random()*5), exp: 350 },
                { id:'sell_gift', desc:'Продать подарки', target: 2 + Math.floor(Math.random()*4), exp: 300 },
                { id:'get_rare', desc:'Получить Rare предметов', target: 1 + Math.floor(Math.random()*3), exp: 500 },
                { id:'upgrade_success', desc:'Успешных улучшений', target: 1 + Math.floor(Math.random()*2), exp: 600 },
                { id:'fuse_card', desc:'Создать карточки', target: 1, exp: 450 },
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            this.dailyPool.push({ ...t, progress: 0 });
        }
        this.weeklyPool = [];
        for (let i = 0; i < 25; i++) {
            const types = [
                { id:'open_case_weekly', desc:'Открыть кейсы', target: 15 + Math.floor(Math.random()*20), exp: 2000 },
                { id:'get_legendary_weekly', desc:'Получить Legendary', target: 2 + Math.floor(Math.random()*3), exp: 3000 },
                { id:'sell_gift_weekly', desc:'Продать подарков', target: 10 + Math.floor(Math.random()*15), exp: 1800 },
                { id:'upgrade_success_weekly', desc:'Успешных улучшений', target: 3 + Math.floor(Math.random()*5), exp: 2500 },
                { id:'fuse_card_weekly', desc:'Создать карточки', target: 4 + Math.floor(Math.random()*4), exp: 2200 },
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            this.weeklyPool.push({ ...t, progress: 0 });
        }
    },
    generateDaily(){
        if (this.dailyPool.length === 0) this.initPools();
        const selected = [];
        const poolCopy = [...this.dailyPool];
        for (let i = 0; i < 5; i++) {
            const idx = Math.floor(Math.random() * poolCopy.length);
            selected.push({...poolCopy[idx], progress: 0});
        }
        GameState.data.activeDailyQuests = selected;
        GameState.data.dailyRefresh = Date.now() + 86400000;
        GameState.save();
    },
    generateWeekly(){
        if (this.weeklyPool.length === 0) this.initPools();
        const selected = [];
        for (let i = 0; i < 3; i++) {
            const idx = Math.floor(Math.random() * this.weeklyPool.length);
            selected.push({...this.weeklyPool[idx], progress: 0});
        }
        GameState.data.activeWeeklyQuests = selected;
        GameState.data.weeklyRefresh = Date.now() + 604800000;
        GameState.save();
    },
    check(id){
        if (!GameState.data.activeDailyQuests || Date.now() > GameState.data.dailyRefresh) this.generateDaily();
        if (!GameState.data.activeWeeklyQuests || Date.now() > GameState.data.weeklyRefresh) this.generateWeekly();
        const dq = GameState.data.activeDailyQuests.find(q => q.id === id && q.progress < q.target);
        if (dq) { dq.progress++; if (dq.progress >= dq.target) UI.toast(`🎯 ${dq.desc} готово!`); }
        const wq = GameState.data.activeWeeklyQuests.find(q => q.id === id && q.progress < q.target);
        if (wq) { wq.progress++; if (wq.progress >= wq.target) UI.toast(`🎯 ${wq.desc} готово!`); }
        GameState.save();
    },
    completeDaily(index){

        Actions.addBPExp(q.exp);
        GameState.data.activeWeeklyQuests.splice(index, 1);

        Audio.success(); UI.toast(`✔ +${q.exp} EXP`); UI.render('quests');

};

    homePage(c){ c.innerHTML = `<div class="grid-cases">${CASE_TYPES.map(cfg=>`<div class="card"><span class="info-btn" onclick="event.stopPropagation();UI.showCaseInfo('${cfg.id}')">i</span><div class="case-icon">${cfg.icon}</div><b>${cfg.name}</b><br><small>${cfg.cost===0?'Бесплатно':cfg.cost+'$'}</small><br><button class="btn btn-accent btn-sm" style="margin-top:0.3rem;" onclick="UI.openCaseUI('${cfg.id}')">Открыть</button></div>`).join('')}</div>`; },
    showCaseInfo(id){

        const items = [...priceItems, ...caseItems].slice(0,20).map(g=>`<div><img src="${g.icon}" style="width:20px;height:20px;vertical-align:middle;"> ${g.name} - ${g.price}$</div>`).join('');

    },
    upgPage(c){
        c.innerHTML = `<div style="display:flex; flex-direction:column; height:100%; gap:0.5rem;"><div style="text-align:center; flex-shrink:0;"><div id="upgChanceText" style="min-height:1.2rem;"></div><div class="liquid-circle" id="liquidCircle"><div class="liquid-fill" id="liquidFill" style="height:0%"></div><div class="triangle-pointer" id="trianglePointer">▼</div><div class="result-icon" id="resultIcon"></div></div><button class="btn btn-accent" id="startUpgradeBtn" disabled style="margin-top:1rem;">Улучшить</button></div><div class="upgrade-squares"><div class="upgrade-square" id="upgSrcSquare" onclick="UI.openSrcPicker()"><div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:2rem; opacity:0.3;">＋</div></div><div class="upgrade-square" id="upgTarSquare" onclick="UI.openTarPicker()"><div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:2rem; opacity:0.3;">＋</div></div></div></div>`;
        window._src = null; window._tar = null;
        this.updateUpgSquareDisplay();
        document.getElementById('startUpgradeBtn').onclick = () => {
            if (!window._src || !window._tar) return;
            document.getElementById('startUpgradeBtn').disabled = true;
            UI.animateUpgrade();
        };
    },
    updateUpgSquareDisplay(){
        const srcSq = document.getElementById('upgSrcSquare');
        const tarSq = document.getElementById('upgTarSquare');
        if (srcSq) {
            if (window._src) {
                srcSq.classList.add('selected');
                srcSq.innerHTML = `<img src="${window._src.icon}" style="width:80%; height:80%; object-fit:contain;">`;
            } else {
                srcSq.classList.remove('selected');
                srcSq.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:2rem; opacity:0.3;">＋</div>`;
            }
        }
        if (tarSq) {
            if (window._tar) {
                tarSq.classList.add('selected');
                tarSq.innerHTML = `<img src="${window._tar.icon}" style="width:80%; height:80%; object-fit:contain;">`;
            } else {
                tarSq.classList.remove('selected');
                tarSq.innerHTML = `<div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:2rem; opacity:0.3;">＋</div>`;
            }
        }
        if (window._src && window._tar) {
            const chance = Math.min(90, Math.floor((window._src.price / window._tar.price) * 100));
            document.getElementById('upgChanceText').textContent = `Шанс: ${chance}%`;
            document.getElementById('liquidFill').style.height = chance + '%';
            document.getElementById('startUpgradeBtn').disabled = false;
        } else {
            document.getElementById('upgChanceText').textContent = '';
            document.getElementById('liquidFill').style.height = '0%';
            document.getElementById('startUpgradeBtn').disabled = true;
        }
    },
    animateUpgrade(){
        if (!window._src || !window._tar) return;
        const circle = document.getElementById('liquidCircle');
        const pointer = document.getElementById('trianglePointer');
        const resultIcon = document.getElementById('resultIcon');
        const liquid = document.getElementById('liquidFill');
        resultIcon.style.display = 'none';
        pointer.style.transition = 'none';
        liquid.style.transition = 'none';
        liquid.style.height = '0%';
        let angle = -90;
        let speed = 12;
        const friction = 0.975;
        let animFrame;
        const rect = circle.getBoundingClientRect();
        const radius = rect.width / 2 - 10;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const updatePointer = () => {
            const rad = angle * Math.PI / 180;
            const x = centerX + radius * Math.sin(rad);
            const y = centerY - radius * Math.cos(rad);
            pointer.style.left = x + 'px';
            pointer.style.top = y + 'px';
            pointer.style.transform = `translate(-50%, -50%) rotate(${angle + 90}deg)`;
        };
        const step = () => {
            angle += speed;
            if (angle > 360) angle -= 360;
            updatePointer();
            speed *= friction;
            if (speed < 0.25) {
                cancelAnimationFrame(animFrame);
                liquid.style.transition = 'height 0.4s ease';
                liquid.style.height = '0%';
                pointer.style.transition = 'left 0.5s ease, top 0.5s ease, transform 0.5s ease';
                pointer.style.left = centerX + 'px';
                pointer.style.top = centerY - radius + 'px';
                pointer.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                setTimeout(() => {
                    const res = Actions.upgrade(window._src, window._tar);
                    window._src = null; window._tar = null;
                    this.updateUpgSquareDisplay();
                    document.getElementById('upgChanceText').textContent = '';
                    document.getElementById('startUpgradeBtn').disabled = true;
                    resultIcon.style.display = 'block';
                    resultIcon.textContent = res.success ? '✅' : '❌';
                    setTimeout(() => { resultIcon.style.display = 'none'; }, 1500);
                    if (res.error) this.toast(res.error);
                    else if (res.success) { Audio.success(); this.toast('✅ Успех!'); }
                    else this.toast('❌ Неудача');
                }, 500);
                return;
            }
            animFrame = requestAnimationFrame(step);
        };
        updatePointer();
        animFrame = requestAnimationFrame(step);
    },
    openSrcPicker(){
        const items = GameState.data.inventory;
        if (!items.length) return this.toast('Инвентарь пуст');
        let html = '<div class="grid-cases" style="max-height:60vh; overflow-y:auto;">';
        items.forEach(g => { html += `<div class="card" style="cursor:pointer" onclick="UI.selectUpgSrcFromPicker('${g.uid}')"><div class="gift-icon"><img src="${g.icon}" alt="${g.name}"></div>${g.name}<br><small>${g.price}$</small></div>`; });
        html += '</div>';
        this.modal('Выберите предмет для улучшения', html);
    },
    selectUpgSrcFromPicker(uid){
        window._src = GameState.data.inventory.find(g => g.uid === uid);
        window._tar = null;
        this.closeModal();
        this.updateUpgSquareDisplay();
    },
    openTarPicker(){
        if (!window._src) return this.toast('Сначала выберите предмет');
        const targets = GIFT_POOL.filter(g => g.price > window._src.price).sort((a, b) => a.price - b.price);
        if (!targets.length) return this.toast('Нет доступных целей');
        let html = '<div class="grid-cases" style="max-height:60vh; overflow-y:auto;">';
        targets.forEach(g => { html += `<div class="card" style="cursor:pointer" onclick="UI.selectUpgTarFromPicker('${g.id}')"><div class="gift-icon"><img src="${g.icon}" alt="${g.name}"></div>${g.name}<br><small>${g.price}$</small></div>`; });
        html += '</div>';
        this.modal('Выберите цель улучшения', html);
    },
    selectUpgTarFromPicker(tid){
        window._tar = GIFT_POOL.find(g => g.id === tid);
        this.closeModal();
        this.updateUpgSquareDisplay();
    },
    fusePage(c){
        window._fuseSelected = [];
        window._fuseGiftId = null;
        this.renderFuseUI(c);
    },
    renderFuseUI(c){
        const selected = window._fuseSelected || [];
        const giftId = window._fuseGiftId;
        c.innerHTML = `<div class="fuse-layout"><div class="fuse-card-preview" id="fuseCardPreview">${giftId ? `<div class="card-result">${this.getFuseCardPreview(giftId)}</div>` : '<div style="opacity:0.3;">?</div>'}</div><div class="fuse-slots" id="fuseSlots">${[0,1,2,3,4].map(i => `<div class="fuse-slot ${selected[i]?"filled":""}" onclick="UI.removeFuseSlot(${i})">${selected[i] ? `<img src="${GIFT_POOL.find(g=>g.id===selected[i]).icon}" style="width:100%;height:100%;object-fit:contain;">` : ''}</div>`).join('')}</div><button class="btn btn-accent btn-sm" id="fuseBtn" style="padding:0.3rem 0.8rem; font-size:0.7rem;" ${selected.length===5 ? '' : 'disabled'}>Fuse</button><div class="fuse-inventory custom-scroll"><div class="inv-header">Инвентарь</div><div class="inv-grid" id="fuseInvGrid"></div></div></div>`;
        this.populateFuseInventory();
        document.getElementById('fuseBtn').onclick = () => { this.performFuseAnimation(); };
    },
    populateFuseInventory(){
        const grid = document.getElementById('fuseInvGrid');
        if (!grid) return;
        const inv = GameState.data.inventory;
        grid.innerHTML = inv.map((g, idx) => {
            const selectedCount = (window._fuseSelected || []).filter(id => id === g.id).length;
            const canSelect = (!window._fuseGiftId || window._fuseGiftId === g.id) && selectedCount < 5;
            return `<div class="card ${canSelect ? '' : 'claimed'}" onclick="UI.selectFuseItem(${idx})"><div class="gift-icon" style="font-size:1.4rem;width:2rem;height:2rem;"><img src="${g.icon}" style="width:100%;height:100%;object-fit:contain;"></div>${g.name}<br><small>${g.price}$</small></div>`;
        }).join('');
    },
    selectFuseItem(invIdx){
        const gift = GameState.data.inventory[invIdx];
        if (!gift) return;
        if (window._fuseGiftId && window._fuseGiftId !== gift.id) { this.toast('Все предметы должны быть одинаковыми'); return; }
        if ((window._fuseSelected || []).length >= 5) { this.toast('Уже выбрано 5 предметов'); return; }
        window._fuseSelected = window._fuseSelected || [];
        window._fuseSelected.push(gift.id);
        window._fuseGiftId = gift.id;
        this.renderFuseUI(document.getElementById('page'));
    },
    removeFuseSlot(slotIdx){
        const sel = window._fuseSelected || [];
        if (slotIdx >= sel.length) return;
        sel.splice(slotIdx, 1);
        if (sel.length === 0) window._fuseGiftId = null;
        this.renderFuseUI(document.getElementById('page'));
    },
    getFuseCardPreview(giftId){
        const gift = GIFT_POOL.find(g => g.id === giftId);
        const base = gift.price;
        return `<img src="${gift.icon}" style="width:50px;height:50px;object-fit:contain;"><br><b>Карточка</b><br><small>${base}$</small>`;
    },
    performFuseAnimation(){
        if (!window._fuseSelected || window._fuseSelected.length < 5) return;
        const selectedIds = [...window._fuseSelected];
        const selectedGifts = [];
        const remainingInv = [...GameState.data.inventory];
        for (let id of selectedIds) {
            const idx = remainingInv.findIndex(g => g.id === id);
            if (idx === -1) { this.toast('Ошибка: предмет не найден'); return; }
            selectedGifts.push(remainingInv[idx]);
            remainingInv.splice(idx, 1);
        }
        const slotElements = document.querySelectorAll('.fuse-slot');
        const target = document.getElementById('fuseCardPreview');
        if (!target || slotElements.length < 5) return;
        const targetRect = target.getBoundingClientRect();
        const targetCenterX = targetRect.left + targetRect.width / 2;
        const targetCenterY = targetRect.top + targetRect.height / 2;
        const flyingIcons = [];
        slotElements.forEach((slot, i) => {
            const rect = slot.getBoundingClientRect();
            const icon = document.createElement('div');
            icon.className = 'fuse-fly';
            icon.style.left = rect.left + rect.width/2 - 15 + 'px';
            icon.style.top = rect.top + rect.height/2 - 15 + 'px';
            icon.style.fontSize = '2rem';
            icon.innerHTML = `<img src="${selectedGifts[i].icon}" style="width:30px;height:30px;">`;
            document.body.appendChild(icon);
            flyingIcons.push(icon);
        });
        requestAnimationFrame(() => {
            flyingIcons.forEach(icon => {
                icon.style.transform = `translate(${targetCenterX - parseFloat(icon.style.left) - 15}px, ${targetCenterY - parseFloat(icon.style.top) - 15}px)`;
                icon.style.opacity = '0';
            });
        });
        setTimeout(() => {
            flyingIcons.forEach(icon => icon.remove());
            this.executeFuse(selectedGifts);
        }, 1500);
    },
    executeFuse(selectedGifts){
        const uids = selectedGifts.map(g => g.uid);
        GameState.data.inventory = GameState.data.inventory.filter(g => !uids.includes(g.uid));
        const base = Math.floor(selectedGifts.reduce((s,g) => s + g.price, 0) / 5);
        const bg = [{name:'Обычный', mult:1, chance:0.65},{name:'Редкий', mult:3, chance:0.25},{name:'Эпический', mult:6, chance:0.08},{name:'Легендарный', mult:12, chance:0.02}];
        const pat = [{name:'Без', mult:1, chance:0.55},{name:'Гео', mult:2, chance:0.3},{name:'Золотой', mult:5, chance:0.1},{name:'Мистик', mult:8, chance:0.05}];
        const rnd = (arr) => { let r=Math.random(),c=0; for (let i of arr) { c+=i.chance; if(r<=c) return i; } return arr[arr.length-1]; };
        const bgR = rnd(bg), patR = rnd(pat);
        const card = { uid:'c'+Date.now(), giftName:selectedGifts[0].name, basePrice:base, bgName:bgR.name, bgMult:bgR.mult, patternName:patR.name, patternMult:patR.mult, finalPrice:Math.floor(base*bgR.mult*patR.mult) };
        GameState.data.cardInventory.push(card);
        Quests.check('fuse_card');
        Actions.addBPExp(300);
        GameState.save(); UI.updateHeader();
        const preview = document.getElementById('fuseCardPreview');
        if (preview) {
            preview.innerHTML = `<div class="card-result card-pop">${card.giftName}<br><b>${card.finalPrice}$</b></div>`;
            preview.classList.add('ready');
        }
        window._fuseSelected = []; window._fuseGiftId = null;
        setTimeout(() => { this.renderFuseUI(document.getElementById('page')); }, 1000);
        Audio.success(); this.toast('✅ Карточка создана!');
    },
    // Battle Pass (без автоскролла к концу)
    bpPage(c){
        const totalLevels = 100;
        const renderNodes = (isPro) => {
            const arr = isPro ? GameState.data.bpProClaimed : GameState.data.bpClaimed;
            let nodes = '';
            for (let lvl = 1; lvl <= totalLevels; lvl++) {
                let circleClass = '';
                if (lvl <= GameState.data.bpLevel) { circleClass = 'reached'; if (!arr[lvl]) circleClass += ' claimable'; }
                if (arr[lvl]) circleClass = 'claimed';
                let rewardText = '';
                if (lvl % 10 === 0) rewardText = `+${isPro ? 10+Math.floor(lvl/3) : 5+Math.floor(lvl/4)} TON`;
                else if (lvl % 3 === 0) rewardText = '🎁 Предмет';
                else rewardText = `+${isPro ? 60+lvl*18 : 40+lvl*12} $`;
                if (lvl % 25 === 0) rewardText = '🎁 Редкий';
                nodes += `<div class="bp-node" onclick="Actions.claimBP(${lvl},${isPro})"><div class="bp-reward">${rewardText}</div><div class="bp-circle ${circleClass}">${lvl}</div></div>`;
            }
            return nodes;
        };
        const normalLevel = GameState.data.bpLevel;
        const normalExp = GameState.data.bpExp;
        const normalMaxExp = 400 + normalLevel * 65;
        const normalWidth = ((normalLevel - 1) + (normalExp / normalMaxExp)) / totalLevels * 100;
        c.innerHTML = `<div class="bp-wrapper"><div class="bp-panel"><div class="bp-header"><span class="bp-title">Обычный BP 🎟️</span><span class="bp-level">Ур. ${GameState.data.bpLevel} / 100</span></div><div class="bp-scroll custom-scroll" id="normalScroll"><div class="bp-track"><div class="bp-fill normal" style="width:${normalWidth}%"></div><div class="bp-nodes">${renderNodes(false)}</div></div></div></div><div class="bp-panel" id="bpProPanel"><div class="bp-header"><span class="bp-title">Pro BP 🎫</span><span class="bp-level">Ур. ${GameState.data.bpLevel} / 100</span></div><div class="bp-scroll custom-scroll" id="proScroll"><div class="bp-track"><div class="bp-fill pro" style="width:${normalWidth}%"></div><div class="bp-nodes">${renderNodes(true)}</div></div></div>${!GameState.data.hasProBP ? '<div class="bp-locked-overlay"><button class="bp-activate-btn" onclick="UI.showProActivateModal()">Активировать BP Pro</button></div>' : ''}</div></div>`;
    },
    showProActivateModal(){
        this.modal('Активация Pro', `<input id="promoInput" placeholder="Введите промокод" style="margin:0.5rem 0;"><button class="btn btn-accent" id="confirmPromoBtn">Подтвердить</button>`);
        document.getElementById('confirmPromoBtn').onclick = () => {
            const code = document.getElementById('promoInput').value.trim().toUpperCase();
            if (!code) return this.toast('Введите код');
            if (GameState.data.usedPromos.includes(code)) return this.toast('Код уже использован');
            const valid = ['PRO2024','GIFT100','ELITE2025'];
            if (!valid.includes(code)) return this.toast('Неверный код');
            GameState.data.hasProBP = true;
            GameState.data.usedPromos.push(code);
            GameState.save(); UI.updateHeader();
            this.closeModal();
            this.toast('✅ Pro BP активирован!');
            this.render('battlepass');
        };
    },
    questPage(c){
        const remDaily = Math.max(0, Math.floor((GameState.data.dailyRefresh - Date.now()) / 1000));
        const rh = Math.floor(remDaily/3600), rm = Math.floor((remDaily%3600)/60), rs = remDaily%60;
        const remWeekly = Math.max(0, Math.floor((GameState.data.weeklyRefresh - Date.now()) / 1000));
        const wh = Math.floor(remWeekly/3600), wm = Math.floor((remWeekly%3600)/60), ws = remWeekly%60;
        c.innerHTML = `<div style="display:flex; flex-direction:column; gap:1rem;">
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0;">Ежедневные задания</h3>
                    <span>Сброс через: ${String(rh).padStart(2,'0')}:${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}</span>
                </div>
                <div style="display:flex; flex-direction:column; gap:0.6rem; margin-top:0.5rem;">
                    ${GameState.data.activeDailyQuests.map((q,i)=>`<div class="card ${q.progress>=q.target?'quest-completed':''}" onclick="Quests.completeDaily(${i})" style="cursor:pointer;"><div style="display:flex; justify-content:space-between; align-items:center;"><span>${q.desc} (${q.progress}/${q.target})</span><span style="font-weight:600; color:var(--accent);">+${q.exp} EXP</span></div></div>`).join('')}
                </div>
            </div>
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0;">Еженедельные задания</h3>
                    <span>Сброс через: ${String(wh).padStart(2,'0')}:${String(wm).padStart(2,'0')}:${String(ws).padStart(2,'0')}</span>
                </div>
                <div style="display:flex; flex-direction:column; gap:0.6rem; margin-top:0.5rem;">
                    ${GameState.data.activeWeeklyQuests.map((q,i)=>`<div class="card ${q.progress>=q.target?'quest-completed':''}" onclick="Quests.completeWeekly(${i})" style="cursor:pointer;"><div style="display:flex; justify-content:space-between; align-items:center;"><span>${q.desc} (${q.progress}/${q.target})</span><span style="font-weight:600; color:#40c9ff;">+${q.exp} EXP</span></div></div>`).join('')}
                </div>
            </div>
        </div>`;
    },
    idxPage(c){
        const totalItems = GIFT_POOL.length;
        const openedCount = Object.keys(GameState.data.collectibles).length;
        c.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem;"><h3>Индекс</h3><span style="font-size:0.85rem;">Открыто ${openedCount} / ${totalItems}</span></div><div class="grid-inv">${GIFT_POOL.map(g => { const collected = GameState.data.collectibles[g.id]||0; return `<div class="card" style="opacity:${collected>0?1:0.3};"><img src="${g.icon}" style="width:3rem;height:3rem;object-fit:contain;"><br><b>${collected>0?g.name:'???'}</b><br><small>${g.price}$</small><br><small style="opacity:0.7;">Выпал: ${collected} раз</small></div>`; }).join('')}</div>`;
    },
    profilePage(c){ c.innerHTML = `<h3>Профиль</h3><p>Ник: ${GameState.data.nickname||'Гость'}</p>${GameState.data.isGuest?`<div><input id="regNick" placeholder="Ник"><input id="regPass1" type="password" placeholder="Пароль"><input id="regPass2" type="password" placeholder="Ещё раз"><button class="btn btn-sm" onclick="UI.register()">Рег</button></div><div><input id="loginNick" placeholder="Ник"><input id="loginPass" type="password" placeholder="Пароль"><button class="btn btn-sm" onclick="UI.login()">Вход</button></div>`:`<button class="btn" onclick="UI.logout()">Выйти</button>`}`; },
    register(){ const n=document.getElementById('regNick').value,p1=document.getElementById('regPass1').value,p2=document.getElementById('regPass2').value; if(!n||p1!==p2||p1.length<4) return this.toast('Ошибка'); GameState.data.nickname=n; GameState.data.isGuest=false; GameState.save(); this.updateHeader(); this.render('profile'); },
    login(){ const n=document.getElementById('loginNick').value; GameState.data.nickname=n; GameState.data.isGuest=false; GameState.save(); this.updateHeader(); this.render('profile'); },
    logout(){ GameState.data.nickname=''; GameState.data.isGuest=true; GameState.save(); this.updateHeader(); this.render('profile'); },
    shopPage(c){ c.innerHTML = `<h3>Магазин стилей</h3><p>Скоро...</p>`; },
    modal(title, content, btns=[]){
        const mc = document.getElementById('modalContainer');
        mc.innerHTML = `<div class="modal-overlay" id="mo"><div class="modal"><button class="close-btn" onclick="UI.closeModal()">✖</button><h3>${title}</h3><div>${content}</div><div>${btns.map(b=>`<button class="btn ${b.cls||''}" style="margin:0.2rem">${b.text}</button>`).join('')}</div></div></div>`;
        document.getElementById('mo').addEventListener('click',e=>{ if(e.target===document.getElementById('mo')) this.closeModal(); });
        btns.forEach((b,i)=>{ const btn = mc.querySelectorAll('.modal .btn')[i]; if(btn) btn.onclick = ()=>{ b.cb(); this.closeModal(); }; });
    },
    closeModal(){ document.getElementById('modalContainer').innerHTML = ''; },
    confirm(msg, cb){ this.modal('⚠️', msg, [{text:'Да', cb},{text:'Отмена',cb:()=>{}}]); },
};

// Инициализация кастомного скроллбара
(function initScrollAppearance() {
  const scrollTargets = document.querySelectorAll('#page, .custom-scroll, .modal');
  scrollTargets.forEach(el => {
    let scrollTimer;
    el.addEventListener('scroll', () => {
      el.classList.add('is-scrolling');
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => el.classList.remove('is-scrolling'), 800);
    }, { passive: true });
  });
  new MutationObserver(() => {
    document.querySelectorAll('*').forEach(node => {
      const style = getComputedStyle(node);
      if ((style.overflowY === 'auto' || style.overflowY === 'scroll' || style.overflow === 'auto' || style.overflow === 'scroll') &&
          !node.classList.contains('custom-scroll') && node !== document.getElementById('page')) {
        node.classList.add('custom-scroll');
        if (!node.dataset.scrollInit) {
          node.dataset.scrollInit = '1';
          let timer;
          node.addEventListener('scroll', () => {
            node.classList.add('is-scrolling');
            clearTimeout(timer);
            timer = setTimeout(() => node.classList.remove('is-scrolling'), 800);
          }, { passive: true });
        }
      }
    });
  }).observe(document.body, { childList: true, subtree: true });
})();

document.querySelectorAll('nav button').forEach(b=> b.addEventListener('click', ()=> UI.navigate(b.dataset.page) ));
GameState.init();
UI.navigate('home');
</script>
